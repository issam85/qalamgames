<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONIC ULTIMATE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Exo+2:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue:#0077ff;--yellow:#ffd700;--red:#ff1133;--green:#00ff66;
  --dark:#03040f;--darker:#010208;--white:#f0f8ff;
  --orange:#ff6600;--purple:#9900ff;--cyan:#00ffee;
}
body{background:var(--darker);font-family:'Exo 2',sans-serif;overflow:hidden;user-select:none;cursor:none;}
canvas{display:block;position:fixed;inset:0;}
#cursor{position:fixed;width:16px;height:16px;border:2px solid var(--yellow);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .1s,height .1s;}
/* UI */
#hud{position:fixed;top:0;left:0;right:0;height:56px;background:linear-gradient(180deg,rgba(0,0,0,.9) 0%,transparent 100%);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;pointer-events:none;}
.hud-block{display:flex;flex-direction:column;align-items:center;}
.hud-label{font-family:'Bangers',cursive;font-size:11px;letter-spacing:2px;color:#666;text-transform:uppercase;}
.hud-val{font-family:'Bangers',cursive;font-size:26px;letter-spacing:1px;color:var(--white);text-shadow:0 0 10px currentColor;line-height:1;}
#char-portrait{width:44px;height:44px;border:2px solid var(--yellow);border-radius:50%;overflow:hidden;box-shadow:0 0 12px var(--yellow);}
#char-portrait canvas{width:44px;height:44px;}
#boost-bar-wrap{width:120px;}
#boost-bar{height:8px;background:#111;border:1px solid #333;border-radius:4px;overflow:hidden;margin-top:4px;}
#boost-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:4px;transition:width .1s;}
/* OVERLAYS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:radial-gradient(ellipse at center,#050a20 0%,#000 100%);}
.screen.hidden{display:none;}
/* TITLE */
#title-screen{background:radial-gradient(ellipse at 50% 40%,#001a4d 0%,#000 70%);}
.title-logo{font-family:'Bangers',cursive;font-size:clamp(60px,12vw,140px);letter-spacing:4px;line-height:.9;text-align:center;background:linear-gradient(180deg,#fff 0%,var(--blue) 40%,#003399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px #0055ff);animation:logoFloat 3s ease-in-out infinite;}
.title-sub{font-family:'Bangers',cursive;font-size:clamp(20px,4vw,42px);color:var(--yellow);letter-spacing:8px;text-shadow:0 0 20px var(--yellow);margin-bottom:40px;animation:pulse 1.5s infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-8px) scale(1.02);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes spin{to{transform:rotate(360deg);}}
.ring-deco{width:80px;height:80px;border:6px solid var(--yellow);border-radius:50%;box-shadow:0 0 30px var(--yellow),inset 0 0 20px rgba(255,215,0,.3);animation:spin 2s linear infinite;margin-bottom:20px;}
.btn-row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.btn{font-family:'Bangers',cursive;font-size:18px;letter-spacing:2px;padding:12px 28px;border:2px solid;border-radius:6px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.btn-primary{background:linear-gradient(135deg,var(--blue),#003aaa);color:#fff;border-color:var(--cyan);box-shadow:0 0 20px rgba(0,119,255,.4);}
.btn-primary:hover{transform:scale(1.06);box-shadow:0 0 35px rgba(0,200,255,.6);}
.btn-secondary{background:rgba(255,255,255,.05);color:var(--yellow);border-color:var(--yellow);box-shadow:0 0 12px rgba(255,215,0,.3);}
.btn-secondary:hover{transform:scale(1.06);background:rgba(255,215,0,.1);}
/* CHARACTER SELECT */
#char-screen{overflow-y:auto;justify-content:flex-start;padding:20px 10px;}
#char-screen h2{font-family:'Bangers',cursive;font-size:clamp(28px,5vw,54px);color:var(--yellow);letter-spacing:4px;text-shadow:0 0 20px var(--yellow);margin-bottom:6px;}
#char-screen p{color:#888;font-size:12px;margin-bottom:20px;}
.char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;max-width:900px;width:90%;padding:10px;}
.char-card{border:2px solid #222;border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .2s;position:relative;background:rgba(255,255,255,.03);}
.char-card:hover,.char-card.sel{border-color:var(--yellow);background:rgba(255,215,0,.07);transform:translateY(-3px);box-shadow:0 0 20px rgba(255,215,0,.3);}
.char-card.locked{opacity:.45;cursor:not-allowed;}
.char-card.locked:hover{transform:none;border-color:#333;background:rgba(255,255,255,.02);}
.char-card canvas{display:block;margin:0 auto 6px;image-rendering:pixelated;}
.char-name{font-family:'Bangers',cursive;font-size:14px;color:#fff;letter-spacing:1px;}
.char-tag{font-size:9px;color:#666;margin-top:2px;line-height:1.4;}
.char-card.sel .char-name{color:var(--yellow);}
.lock-icon{position:absolute;top:6px;right:8px;font-size:14px;}
.unlock-req{font-size:8px;color:#f88;margin-top:2px;}
.stat-bars{margin-top:6px;}
.stat-row{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.stat-label{font-size:7px;color:#555;width:20px;text-align:right;}
.stat-track{flex:1;height:4px;background:#111;border-radius:2px;overflow:hidden;}
.stat-fill{height:100%;border-radius:2px;}
/* GAMEOVER */
#go-screen h2{font-family:'Bangers',cursive;font-size:clamp(40px,8vw,90px);color:var(--red);text-shadow:0 0 30px var(--red);animation:pulse 1s infinite;}
#go-score{font-family:'Bangers',cursive;font-size:28px;color:var(--yellow);margin:10px 0 4px;}
#go-hi{font-family:'Bangers',cursive;font-size:18px;color:#888;margin-bottom:30px;}
/* Controls hint */
#controls{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:16px;z-index:100;pointer-events:none;}
.ctrl-hint{font-family:'Bangers',cursive;font-size:12px;color:#444;letter-spacing:1px;background:rgba(0,0,0,.5);padding:4px 10px;border-radius:4px;border:1px solid #222;}
</style>
</head>
<body>
<div id="cursor"></div>
<canvas id="c"></canvas>
<!-- HUD -->
<div id="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="hScr">0</div>
  </div>
  <div class="hud-block">
    <canvas id="char-portrait" width="44" height="44"></canvas>
  </div>
  <div class="hud-block" style="min-width:80px;align-items:center;">
    <div class="hud-label">Rings</div>
    <div class="hud-val" style="color:var(--yellow)" id="hRing">0</div>
  </div>
  <div class="hud-block" id="boost-bar-wrap">
    <div class="hud-label">Boost</div>
    <div id="boost-bar"><div id="boost-fill"></div></div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Levens</div>
    <div class="hud-val" style="color:var(--red)" id="hLiv">❤❤❤</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Hi-Score</div>
    <div class="hud-val" style="color:#aaa;font-size:18px;" id="hHi">0</div>
  </div>
</div>
<!-- TITLE -->
<div class="screen" id="title-screen">
  <div class="ring-deco"></div>
  <div class="title-logo">SONIC</div>
  <div class="title-sub">ULTIMATE</div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">▶ SPELEN</button>
    <button class="btn btn-secondary" onclick="showCharScreen()">👤 KARAKTERS</button>
  </div>
  <div style="margin-top:20px;font-size:10px;color:#333;font-family:'Bangers',cursive;letter-spacing:2px;">SPATIE/↑ SPRINGEN • X BOOST • Z AANVAL</div>
  <div style="margin-top:8px;font-size:9px;color:#ff2200;font-family:'Bangers',cursive;letter-spacing:3px;animation:blink 0.8s infinite;">⚠ EXTREME MOEILIJKHEID ⚠</div>
</div>
<!-- CHAR SELECT -->
<div class="screen hidden" id="char-screen">
  <h2>KIES JE HELD</h2>
  <p id="total-label">Totaal verdiend: 0 punten</p>
  <div class="char-grid" id="charGrid"></div>
  <div class="btn-row" style="margin-top:16px;">
    <button class="btn btn-primary" onclick="confirmChar()">✓ KIEZEN & SPELEN</button>
    <button class="btn btn-secondary" onclick="backToTitle()">← TERUG</button>
  </div>
</div>
<!-- GAME OVER -->
<div class="screen hidden" id="go-screen">
  <h2>GAME OVER</h2>
  <div id="go-score"></div>
  <div id="go-hi"></div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="startGame()">▶ OPNIEUW</button>
    <button class="btn btn-secondary" onclick="showCharScreen()">👤 KARAKTER</button>
  </div>
</div>
<div id="powerDisplay" style="position:fixed;top:62px;left:50%;transform:translateX(-50%);font-family:'Bangers',cursive;font-size:24px;letter-spacing:3px;pointer-events:none;z-index:101;display:none;text-align:center;"></div>
<div id="controls">
  <div class="ctrl-hint">SPATIE/↑ SPRINGEN</div>
  <div class="ctrl-hint">X BOOST</div>
  <div class="ctrl-hint">Z AANVAL</div>
  <div class="ctrl-hint">↓/S REMMEN</div>
  <div class="ctrl-hint">TOUCH = SPRINGEN</div>
</div>
<script>
// ═══════════════════════════════════════════════════
//  CHARACTERS  (10 total)
// ═══════════════════════════════════════════════════
const CHARS = [
  {id:'sonic',    name:'Sonic',    tag:'Snelste ter wereld\nDubbel sprong',      color:'#1a6fff', acc:'#ffd700', eye:'#1ddd44', spd:1.5, jump:-17, maxJ:2, boost:true,  unlockAt:0},
  {id:'tails',    name:'Tails',    tag:'Zweefvlucht\nVliegende staarten',         color:'#ff8800', acc:'#fff',    eye:'#00ccff', spd:1.1, jump:-13, maxJ:1, glide:true,  unlockAt:0},
  {id:'knuckles', name:'Knuckles', tag:'IJzersterk\nBreekt alles',               color:'#dd1111', acc:'#fff',    eye:'#fff',    spd:1.0, jump:-15, maxJ:1, punch:true,  unlockAt:0},
  {id:'amy',      name:'Amy',      tag:'Hamer-aanval\nDubbele ringen',            color:'#ff3388', acc:'#ff0055',eye:'#00cc88', spd:1.1, jump:-14, maxJ:1, hammer:true, unlockAt:200},
  {id:'shadow',   name:'Shadow',   tag:'Chaos Control\nSuper boost',              color:'#111',    acc:'#ff2200',eye:'#ff2200', spd:1.7, jump:-18, maxJ:2, chaos:true,  unlockAt:500},
  {id:'silver',   name:'Silver',   tag:'Telekinese\nPsycho lanceer',             color:'#c8c8ff', acc:'#ffff88',eye:'#eecc00', spd:1.2, jump:-15, maxJ:1, psych:true,  unlockAt:800, fly:true},
  {id:'blaze',    name:'Blaze',    tag:'Vuurmagie\nSpin vlam',                   color:'#9933cc', acc:'#ff6600',eye:'#ff9900', spd:1.3, jump:-16, maxJ:2, fire:true,   unlockAt:1200},
  {id:'rouge',    name:'Rouge',    tag:'Vleugels\nJuwelen gooi',                 color:'#ff66aa', acc:'#fff',    eye:'#99ffcc', spd:1.2, jump:-15, maxJ:1, wings:true,  unlockAt:1600},
  {id:'espio',    name:'Espio',    tag:'Onzichtbaar\nNinja steek',               color:'#6633aa', acc:'#ff2200',eye:'#ff2200', spd:1.4, jump:-15, maxJ:2, ninja:true,  unlockAt:2000},
  {id:'omega',    name:'Omega',    tag:'Robot krijger\nRaket salvo',             color:'#dd3300', acc:'#ffd700',eye:'#ff4400', spd:0.9, jump:-14, maxJ:1, rocket:true, unlockAt:2500},
];
// ═══════════════════════════════════════════════════
//  DRAW CHARACTERS (pixel-art style on canvas)
// ═══════════════════════════════════════════════════
function drawChar(ctx, ch, x, y, w, h, frame=0, onGround=true, special=false){
  const cx=x+w/2, fw=w, fh=h;
  ctx.save();
  ctx.globalAlpha=0.2;
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(cx,y+fh,fw*0.4,5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  if(special){
    ctx.save();
    ctx.globalAlpha=0.25;
    ctx.fillStyle=ch.acc;
    ctx.beginPath();ctx.arc(cx,y+fh*.5,fw*0.7,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  if(ch.id==='omega'){
    ctx.fillStyle='#cc2200';
    ctx.fillRect(x+fw*.1,y+fh*.25,fw*.8,fh*.55);
    ctx.fillStyle='#991100';
    ctx.fillRect(x+fw*.15,y+fh*.3,fw*.7,fh*.1);
    ctx.fillStyle='#cc2200';
    ctx.fillRect(x+fw*.2,y,fw*.6,fh*.3);
    ctx.fillStyle='#ff4400';
    ctx.fillRect(x+fw*.25,y+fh*.06,fw*.5,fh*.1);
    ctx.fillStyle='#ffaa00';
    ctx.fillRect(x+fw*.28,y+fh*.07,fw*.44,fh*.06);
    const legA=onGround?Math.sin(frame*Math.PI/2)*fw*.08:0;
    ctx.fillStyle='#882200';
    ctx.fillRect(x+fw*.2-legA,y+fh*.78,fw*.25,fh*.22);
    ctx.fillRect(x+fw*.55+legA,y+fh*.78,fw*.25,fh*.22);
    ctx.fillStyle='#771100';
    ctx.fillRect(x-fw*.05,y+fh*.3,fw*.18,fh*.35);
    ctx.fillRect(x+fw*.87,y+fh*.3,fw*.18,fh*.35);
    ctx.fillStyle='#333';
    ctx.beginPath();ctx.arc(x-fw*.05+fw*.09,y+fh*.65,fw*.1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+fw*.87+fw*.09,y+fh*.65,fw*.1,0,Math.PI*2);ctx.fill();
    return;
  }
  const legSwing = onGround ? Math.sin(frame*Math.PI/2)*fw*.1 : 0;
  const shoeColor = ch.id==='shadow'?'#880000': ch.id==='rouge'?'#ff66aa': '#cc1111';
  ctx.fillStyle=shoeColor;
  ctx.beginPath();ctx.ellipse(cx-fw*.14-legSwing,y+fh*.9,fw*.2,fh*.1,0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+fw*.14+legSwing,y+fh*.9,fw*.2,fh*.1,-0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.fillRect(cx-fw*.3-legSwing,y+fh*.83,fw*.16,fh*.04);
  ctx.fillRect(cx+fw*.14+legSwing,y+fh*.83,fw*.16,fh*.04);
  ctx.fillStyle=ch.color;
  ctx.beginPath();ctx.ellipse(cx,y+fh*.6,fw*.42,fh*.33,0,0,Math.PI*2);ctx.fill();
  if(ch.id!=='shadow'&&ch.id!=='espio'){
    ctx.fillStyle='rgba(255,255,255,.18)';
    ctx.beginPath();ctx.ellipse(cx+fw*.05,y+fh*.62,fw*.22,fh*.2,0,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle=ch.color;
  const armSwing=onGround?Math.sin(frame*Math.PI/2+Math.PI)*fw*.08:0;
  ctx.beginPath();ctx.ellipse(cx-fw*.44,y+fh*.54+armSwing,fw*.14,fh*.18,0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+fw*.44,y+fh*.54-armSwing,fw*.14,fh*.18,-0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';
  ctx.beginPath();ctx.arc(cx-fw*.48,y+fh*.66+armSwing,fw*.12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+fw*.48,y+fh*.66-armSwing,fw*.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ch.color;
  ctx.beginPath();ctx.arc(cx,y+fh*.28,fw*.36,0,Math.PI*2);ctx.fill();
  if(ch.id==='amy'){
    ctx.fillStyle=ch.acc;
    ctx.beginPath();ctx.ellipse(cx-fw*.08,y+fh*.02,fw*.15,fh*.09,-0.6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+fw*.1,y+fh*.02,fw*.15,fh*.09,0.6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff88bb';
    ctx.beginPath();ctx.arc(cx,y+fh*.04,fw*.07,0,Math.PI*2);ctx.fill();
  } else if(ch.id==='tails'){
    ctx.fillStyle=ch.color;
    ctx.beginPath();ctx.arc(cx-fw*.22,y,fw*.12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+fw*.08,y-fw*.04,fw*.12,0,Math.PI*2);ctx.fill();
    if(special){
      ctx.fillStyle='#ffaa44';
      ctx.beginPath();ctx.ellipse(cx-fw*.4,y+fh*.7,fw*.22,fh*.14,frame*.8,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx-fw*.5,y+fh*.8,fw*.16,fh*.1,frame*.8+.5,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillStyle='#ffaa44';
      ctx.beginPath();ctx.ellipse(cx-fw*.35,y+fh*.75,fw*.18,fh*.12,0.3,0,Math.PI*2);ctx.fill();
    }
  } else if(ch.id==='rouge'){
    ctx.fillStyle=ch.color;
    const wFlap=special?Math.sin(frame*.5)*fh*.15:0;
    ctx.beginPath();
    ctx.moveTo(cx-fw*.3,y+fh*.3);
    ctx.quadraticCurveTo(cx-fw*.9,y+fh*.1-wFlap,cx-fw*.7,y+fh*.55);
    ctx.closePath();ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx+fw*.3,y+fh*.3);
    ctx.quadraticCurveTo(cx+fw*.9,y+fh*.1-wFlap,cx+fw*.7,y+fh*.55);
    ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx-fw*.2,y+fh*.04);ctx.lineTo(cx-fw*.38,y-fh*.14);ctx.lineTo(cx-fw*.08,y+fh*.04);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(cx+fw*.08,y+fh*.04);ctx.lineTo(cx+fw*.3,y-fh*.14);ctx.lineTo(cx+fw*.22,y+fh*.04);ctx.closePath();ctx.fill();
  } else {
    const spikeData=ch.id==='knuckles'?[[-0.35,.3,.14,.17],[-0.28,.14,.12,.18],[-0.18,.04,.1,.2]]:
                    ch.id==='shadow'?[[-0.38,.25,.14,.18],[-0.28,.1,.12,.2],[-0.15,.0,.1,.2]]:
                    ch.id==='blaze'?[[-0.32,.22,.13,.19],[-0.22,.08,.11,.2]]:
                    ch.id==='silver'?[[-0.28,.18,.12,.18],[-0.18,.06,.1,.19],[-0.08,.0,.1,.2]]:
                    ch.id==='espio'?[[-0.38,.28,.14,.2],[-0.26,.1,.12,.22],[-0.14,.0,.1,.2]]:
                    [[-0.32,.24,.13,.18],[-0.22,.08,.11,.2],[-0.1,.0,.1,.2]];
    ctx.fillStyle=ch.color;
    for(const [dx,dy,rw,rh] of spikeData){
      ctx.beginPath();
      ctx.ellipse(cx+fw*dx, y+fh*dy, fw*rw, fh*rh, -0.8, 0, Math.PI*2);
      ctx.fill();
    }
    if(ch.id==='knuckles'){
      ctx.fillStyle='#bb0000';
      for(let i=0;i<3;i++){
        ctx.beginPath();
        ctx.moveTo(cx-fw*.3+i*fw*.15,y+fh*.38);
        ctx.lineTo(cx-fw*.35+i*fw*.15,y+fh*.7);
        ctx.lineTo(cx-fw*.2+i*fw*.15,y+fh*.7);
        ctx.closePath();ctx.fill();
      }
    }
  }
  ctx.fillStyle='white';
  ctx.beginPath();ctx.ellipse(cx+fw*.1,y+fh*.25,fw*.23,fh*.15,.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ch.eye;
  ctx.beginPath();ctx.arc(cx+fw*.17,y+fh*.23,fw*.1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(cx+fw*.19,y+fh*.22,fw*.055,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.beginPath();ctx.arc(cx+fw*.14,y+fh*.19,fw*.03,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ch.id==='blaze'||ch.id==='silver'?ch.acc:ch.id==='shadow'?'#cc4444':'#cc8855';
  ctx.beginPath();ctx.ellipse(cx+fw*.33,y+fh*.29,fw*.07,fh*.05,0,0,Math.PI*2);ctx.fill();
  if(ch.id==='knuckles'){
    ctx.fillStyle='#cc0000';
    ctx.beginPath();ctx.arc(cx+fw*.52,y+fh*.6,fw*.14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    for(let k=0;k<3;k++){
      ctx.beginPath();ctx.arc(cx+fw*.52+Math.cos(k*2.09)*fw*.11, y+fh*.6+Math.sin(k*2.09)*fh*.09, fw*.035,0,Math.PI*2);ctx.fill();
    }
  }
  if(ch.id==='silver'){
    ctx.strokeStyle='rgba(180,180,255,.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(cx,y+fh*.5,fw*.6,fh*.55,0,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(cx,y+fh*.5,fw*.75,fh*.7,frame*.05,0,Math.PI*2);ctx.stroke();
  }
  if(ch.id==='blaze'&&special){
    for(let f=0;f<4;f++){
      const fa=(frame*.3+f*1.57)%(Math.PI*2);
      ctx.fillStyle=`rgba(255,${80+f*40},0,${0.4-f*.08})`;
      ctx.beginPath();ctx.arc(cx+Math.cos(fa)*fw*.4, y+fh*.9+Math.sin(fa)*fh*.1, 4,0,Math.PI*2);ctx.fill();
    }
  }
  if(ch.id==='espio'&&special){
    ctx.fillStyle=ch.acc;
    const sa=frame*.2;
    for(let p=0;p<4;p++){
      const px=cx+Math.cos(sa+p*1.57)*fw*.6;
      const py=y+fh*.5+Math.sin(sa+p*1.57)*fh*.4;
      ctx.save();ctx.translate(px,py);ctx.rotate(sa+p);
      ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(2,0);ctx.lineTo(0,5);ctx.lineTo(-2,0);ctx.closePath();ctx.fill();
      ctx.restore();
    }
  }
}

class Player{
  constructor(ch){
    this.ch=ch;
    this.w=46;this.h=50;
    this.x=110;this.y=GROUND-this.h;
    this.vy=0;this.vx=0;
    this.onGround=true;
    this.jumps=0;
    this.runFrame=0;this.runTick=0;
    this.spinAngle=0;this.spinning=false;
    this.gliding=false;
    this.boosting=false;
    this.boostTimer=0;
    this.attacking=false;
    this.attackTimer=0;
    this.flyEnergy=100;
    this.trail=[];
    this.abilityCD=0;
    this.braking=false;
    this.brakeTimer=0;
    this.brakeSparks=[];
  }
  jump(){
    const maxJ=this.ch.maxJ||1;
    if(this.jumps<maxJ){
      this.vy=this.ch.jump;
      this.onGround=false;this.jumps++;
      this.spinning=true;this.gliding=false;
      spawnParticles(this.x+this.w/2,this.y+this.h,8,this.ch.color,[-3,3],[-4,-1],20,5);
    } else if(this.ch.glide&&this.vy>0){
      this.gliding=true;
    }
  }
  boost(){
    if(boostEnergy>10&&this.abilityCD<=0){
      this.boosting=true;this.boostTimer=40;
      this.abilityCD=80;
      boostEnergy=Math.max(0,boostEnergy-50);
      spawnParticles(this.x,this.y+this.h/2,12,this.ch.acc,[-6,-2],[-2,2],25,6);
      if(this.ch.id==='shadow'){gameSpeed+=3;setTimeout(()=>gameSpeed=Math.max(5,gameSpeed-3),800);}
    }
  }
  attack(){
    if(!this.attacking&&this.abilityCD<=0){
      this.attacking=true;this.attackTimer=25;
      this.abilityCD=50;
      spawnParticles(this.x+this.w,this.y+this.h/2,15,this.ch.acc,[-1,5],[-3,3],30,7);
    }
  }
  update(){
    let grav=0.85;
    if(this.gliding&&this.vy>0) grav=0.18;
    if(this.ch.fly&&keys['Space']&&this.flyEnergy>0){
      this.vy-=0.6;this.flyEnergy=Math.max(0,this.flyEnergy-1.2);
    } else {
      if(this.onGround) this.flyEnergy=Math.min(100,this.flyEnergy+2);
    }
    this.vy+=grav;
    this.y+=this.vy;
    if(this.y>=GROUND-this.h){
      this.y=GROUND-this.h;this.vy=0;
      this.onGround=true;this.jumps=0;this.spinning=false;this.gliding=false;
    } else {this.onGround=false;}
    if(this.boosting||this.spinning){
      this.trail.push({x:this.x+this.w/2,y:this.y+this.h/2,life:12,color:this.ch.color});
    }
    this.trail=this.trail.filter(t=>{t.life--;return t.life>0;});
    if(this.boostTimer>0)this.boostTimer--;else this.boosting=false;
    if(this.attackTimer>0)this.attackTimer--;else this.attacking=false;
    if(this.abilityCD>0)this.abilityCD--;
    if(this.spinning)this.spinAngle+=0.38;
    this.runTick++;if(this.runTick>5){this.runTick=0;this.runFrame=(this.runFrame+1)%4;}
    boostEnergy=Math.min(100,boostEnergy+0.05);
    document.getElementById('boost-fill').style.width=boostEnergy+'%';
    if(activePower){
      if(activePower.id==='giant'){this.w=80;this.h=85;}
      else if(activePower.id==='tiny'){this.w=22;this.h=24;}
      else{this.w=46;this.h=50;}
    } else {this.w=46;this.h=50;}
    this.braking = !!(keys['ArrowDown']||keys['KeyS']) && this.onGround;
    if(this.braking){
      gameSpeed=Math.max(0, gameSpeed-0.25);
      if(gameSpeed>0.5 && Math.random()<0.7){
        this.brakeSparks.push({
          x:this.x+this.w/2+(Math.random()-0.5)*14,
          y:this.y+this.h-2,
          vx:-(1+Math.random()*5),
          vy:-(Math.random()*3+0.5),
          life:14,
          col:Math.random()<0.5?'#ff8800':'#ffdd00'
        });
      }
    }
    this.brakeSparks=this.brakeSparks.filter(function(s){
      s.x+=s.vx; s.y+=s.vy; s.vy+=0.2; s.life--;
      return s.life>0;
    });
  }
  draw(){
    this.trail.forEach(t=>{
      ctx.save();ctx.globalAlpha=t.life/12*0.4;
      ctx.fillStyle=t.color;
      ctx.beginPath();ctx.arc(t.x,t.y,10*t.life/12,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
    if(activePower && powerTimer>0){
      var auraAlpha=0.15+Math.abs(Math.sin(frameCount*.1))*.15;
      ctx.save();
      ctx.globalAlpha=auraAlpha;
      ctx.fillStyle=activePower.col1;
      var aw=this.w*1.6, ah=this.h*1.6;
      ctx.beginPath();ctx.ellipse(this.x+this.w/2,this.y+this.h/2,aw/2,ah/2,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(this.x,this.y+this.h+4,this.w,5);
      ctx.fillStyle=activePower.col1;
      ctx.fillRect(this.x,this.y+this.h+4,this.w*(powerTimer/activePower.duration),5);
      ctx.restore();
    }
    ctx.save();
    if(invTimer>0&&Math.floor(invTimer/4)%2===0) ctx.globalAlpha=0.3;
    if(this.spinning){
      ctx.translate(this.x+this.w/2,this.y+this.h/2);
      ctx.rotate(this.spinAngle);
      ctx.translate(-this.x-this.w/2,-this.y-this.h/2);
    }
    if(this.attacking){
      ctx.shadowColor=this.ch.acc;ctx.shadowBlur=20;
    }
    drawChar(ctx,this.ch,this.x,this.y,this.w,this.h,this.runFrame,this.onGround,this.boosting||this.attacking);
    if(this.attacking){
      ctx.globalAlpha=0.5;
      ctx.strokeStyle=this.ch.acc;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(this.x+this.w+15,this.y+this.h/2,22,0,Math.PI*2);ctx.stroke();
    }
    if(this.braking||this.brakeSparks.length>0){
      for(var bi=0;bi<this.brakeSparks.length;bi++){
        var sp=this.brakeSparks[bi];
        ctx.save();ctx.globalAlpha=sp.life/14;ctx.fillStyle=sp.col;
        ctx.beginPath();ctx.arc(sp.x,sp.y,3*(sp.life/14),0,Math.PI*2);ctx.fill();ctx.restore();
      }
      if(this.braking){
        ctx.save();ctx.globalAlpha=0.5;
        ctx.strokeStyle='#cc6600';ctx.lineWidth=4;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(this.x+this.w*.3,this.y+this.h);ctx.lineTo(this.x+this.w*.3+20,this.y+this.h);ctx.stroke();
        ctx.beginPath();ctx.moveTo(this.x+this.w*.7,this.y+this.h);ctx.lineTo(this.x+this.w*.7+20,this.y+this.h);ctx.stroke();
        ctx.restore();
        ctx.save();ctx.globalAlpha=0.15;ctx.fillStyle='#ff6600';
        ctx.beginPath();ctx.arc(this.x+this.w/2,this.y+this.h*.7,this.w*.7,0,Math.PI*2);ctx.fill();ctx.restore();
      }
    }
    ctx.restore();
  }
  getBounds(){ return {x:this.x+8,y:this.y+6,w:this.w-16,h:this.h-8}; }
  getAttackBounds(){
    if(!this.attacking) return null;
    return {x:this.x+this.w-5,y:this.y+5,w:44,h:this.h-10};
  }
}

const ENEMY_TYPES=[
  {type:'motobot', color:'#555',w:40,h:46,pts:100,isEnemy:true},
  {type:'crabmeat',color:'#cc8800',w:44,h:40,pts:150,isEnemy:true},

  {type:'egg_pawn',color:'#ff2200',w:36,h:50,pts:300,isEnemy:true},
  {type:'rock',    color:'#888',w:32,h:30,pts:0,isEnemy:false},
  {type:'spike',   color:'#aaa',w:32,h:36,pts:0,isEnemy:false},
  {type:'laser',   color:'#ff4400',w:20,h:60,pts:0,isEnemy:false},
  {type:'spring',  color:'#ffd700',w:28,h:34,pts:50,isEnemy:false,bouncy:true},
  {type:'pit_sign',color:'#aa5500',w:14,h:80,pts:0,isEnemy:false,tall:true},

class Enemy{
  constructor(){
    const type=ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
    Object.assign(this,type);
    this.x=W+20;
    this.flyH=this.fly?(type.flyH||0.4):null;
    this.y=this.fly?(GROUND-(this.h)-(H*(this.flyH*(0.4+Math.random()*0.6)))):GROUND-this.h;
    this.baseY=this.y;
    this.anim=Math.random()*Math.PI*2;
    this.dead=false;
    if(this.type==='spike') this.y=GROUND-this.h+6;
  }
  update(spd){this.x-=spd;this.anim+=0.08;if(this.fly) this.y=this.baseY+Math.sin(this.anim)*18;}
  draw(){
    const x=this.x,y=this.y,w=this.w,h=this.h;
    const cx=x+w/2,cy=y+h/2;
    ctx.save();
    switch(this.type){
      case 'rock':
        ctx.fillStyle='#777';ctx.beginPath();ctx.roundRect(x+2,y+4,w-4,h-4,10);ctx.fill();
        ctx.fillStyle='#999';ctx.beginPath();ctx.roundRect(x,y,w,h-8,12);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.15)';ctx.beginPath();ctx.ellipse(cx-4,y+8,8,5,-.3,0,Math.PI*2);ctx.fill();
        break;
      case 'spike':
        ctx.fillStyle='#aaa';
        for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(x+i*8,y+h);ctx.lineTo(x+i*8+4,y);ctx.lineTo(x+i*8+8,y+h);ctx.closePath();ctx.fill();}
        ctx.strokeStyle='rgba(200,200,255,.3)';ctx.lineWidth=1;
        for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(x+i*8+2,y+h-4);ctx.lineTo(x+i*8+4,y+4);ctx.stroke();}
        break;
      case 'laser':
        ctx.fillStyle='#552200';ctx.fillRect(x,y,w,h);
        ctx.fillStyle='#ff4400';ctx.fillRect(x+4,y+6,w-8,10);
        ctx.fillStyle='rgba(255,80,0,.3)';
        if(Math.sin(this.anim*3)>0){ctx.fillRect(x-20,y+8,w+40,6);}
        break;
      case 'spring':
        ctx.fillStyle='#ffd700';ctx.fillRect(x+4,y+h*.5,w-8,h*.5);
        ctx.strokeStyle='#ffaa00';ctx.lineWidth=3;
        for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(x+6+(i%2)*4,y+h*.12+i*h*.1);ctx.lineTo(x+w-6-(i%2)*4,y+h*.12+i*h*.1);ctx.stroke();}
        ctx.fillStyle='#fff8dd';ctx.fillRect(x+2,y,w-4,h*.2);
        break;
      case 'pit_sign':
        ctx.fillStyle='#553300';ctx.fillRect(x+4,y,w-8,h);
        ctx.fillStyle='#ffcc00';ctx.fillRect(x,y+10,w,h*.25);
        ctx.fillStyle='#222';ctx.font='bold 10px monospace';ctx.fillText('!',x+5,y+28);
        break;
      case 'motobot':
        ctx.fillStyle='#444';ctx.fillRect(cx-16,y+4,32,24);
        ctx.fillStyle='#f00';ctx.fillRect(cx-10,y+8,8,8);ctx.fillRect(cx+2,y+8,8,8);
        ctx.fillStyle='#ff4444';
        if(Math.sin(this.anim*4)>0){ctx.fillRect(cx-9,y+9,6,6);ctx.fillRect(cx+3,y+9,6,6);}
        ctx.fillStyle='#666';ctx.fillRect(cx-12,y+28,10,14);ctx.fillRect(cx+2,y+28,10,14);
        ctx.fillStyle='#222';
        ctx.beginPath();ctx.arc(cx-6,y+h-4,8,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(cx+6,y+h-4,8,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#888';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(cx-6,y+h-4,8,this.anim,this.anim+Math.PI);ctx.stroke();
        ctx.beginPath();ctx.arc(cx+6,y+h-4,8,this.anim,this.anim+Math.PI);ctx.stroke();
        break;
      case 'crabmeat':
        ctx.fillStyle='#dd8800';ctx.beginPath();ctx.ellipse(cx,y+h*.55,18,16,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#bb6600';
        ctx.beginPath();ctx.ellipse(cx-18,y+h*.5+Math.sin(this.anim)*5,12,9,-0.4,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+18,y+h*.5+Math.sin(this.anim+Math.PI)*5,12,9,0.4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#f00';ctx.fillRect(cx-8,y+6,6,6);ctx.fillRect(cx+2,y+6,6,6);
        ctx.strokeStyle='#885500';ctx.lineWidth=2;
        for(let l=0;l<3;l++){
          ctx.beginPath();ctx.moveTo(cx-10,y+h*.7);ctx.lineTo(cx-20-l*3,y+h);ctx.stroke();
          ctx.beginPath();ctx.moveTo(cx+10,y+h*.7);ctx.lineTo(cx+20+l*3,y+h);ctx.stroke();
        }
        break;
      case 'buzzbomber':
        ctx.fillStyle='#2266cc';ctx.beginPath();ctx.ellipse(cx,cy,16,10,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#4488ff';
        ctx.beginPath();ctx.ellipse(cx-4,cy-8,14,6,-.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(cx+4,cy-8,14,6,.3,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#f00';ctx.fillRect(cx-3,cy-3,6,6);
        if(Math.sin(this.anim*2)>0.7){ctx.fillStyle='rgba(255,0,0,.5)';ctx.fillRect(cx+16,cy-2,40,4);}
        break;
      case 'egg_pawn':
        ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(cx,y+h*.25,16,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#cc1100';ctx.fillRect(cx-14,y+h*.38,28,h*.4);
        ctx.fillStyle='#ff4422';ctx.fillRect(cx-10,y+h*.78,8,h*.22);ctx.fillRect(cx+2,y+h*.78,8,h*.22);
        ctx.fillStyle='#ffd700';ctx.fillRect(cx-7,y+6,14,4);
        ctx.fillStyle='rgba(255,255,0,.7)';ctx.fillRect(cx-4,y+8,8,2);
        ctx.strokeStyle='#888';ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(cx+14,y+h*.45);ctx.lineTo(cx+28+Math.sin(this.anim)*3,y+h*.35);ctx.stroke();
        ctx.fillStyle='#aaa';ctx.beginPath();ctx.moveTo(cx+28+Math.sin(this.anim)*3,y+h*.3);ctx.lineTo(cx+34+Math.sin(this.anim)*3,y+h*.4);ctx.lineTo(cx+28+Math.sin(this.anim)*3,y+h*.5);ctx.closePath();ctx.fill();
        break;
    }
    ctx.restore();
  }
  getBounds(){return{x:this.x+4,y:this.y+4,w:this.w-8,h:this.h-4};}
}

class Ring{
  constructor(x,y){this.x=x;this.y=y;this.r=11;this.angle=Math.random()*Math.PI*2;this.alpha=1;this.collected=false;}
  update(spd){this.x-=spd;this.angle+=0.1;if(this.collected)this.alpha-=0.1;}
  draw(){
    if(this.alpha<=0)return;
    ctx.save();ctx.globalAlpha=this.alpha;
    const sq=Math.abs(Math.cos(this.angle));
    const grad=ctx.createRadialGradient(this.x,this.y,2,this.x,this.y,this.r);
    grad.addColorStop(0,'#fffaaa');grad.addColorStop(1,'#ffaa00');
    ctx.strokeStyle=grad;ctx.lineWidth=3.5;
    ctx.beginPath();ctx.ellipse(this.x,this.y,this.r*(0.25+sq*.75),this.r,0,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,200,.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.ellipse(this.x-2,this.y-2,(this.r-4)*(0.25+sq*.75),this.r-4,0,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
  getBounds(){return{x:this.x-this.r,y:this.y-this.r,w:this.r*2,h:this.r*2};}
}
function hexAlpha(hex, a){
  var r=parseInt(hex.slice(1,3),16);
  var g=parseInt(hex.slice(3,5),16);
  var b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a.toFixed(2)+')';
}
// ═══════════════════════════════════════════════════
//  DIAMOND
// ═══════════════════════════════════════════════════
class Diamond{
  constructor(){
    this.type=DIAMOND_TYPES[Math.floor(Math.random()*DIAMOND_TYPES.length)];
    this.x=W+20;
    this.y=GROUND-60-Math.random()*(H*0.35);
    this.r=15;
    this.angle=0;
    this.bobOffset=Math.random()*Math.PI*2;
    this.alpha=1;
    this.collected=false;
    this.glowPhase=0;
  }
  update(spd){
    this.x-=spd;this.angle+=0.04;this.glowPhase+=0.08;
    this.y+= Math.sin(this.glowPhase+this.bobOffset)*0.6;
    if(this.collected) this.alpha-=0.08;
  }
  draw(){
    if(this.alpha<=0)return;
    const x=this.x,y=this.y,r=this.r;
    ctx.save();ctx.globalAlpha=this.alpha;ctx.translate(x,y);ctx.rotate(this.angle);
    const glow=Math.abs(Math.sin(this.glowPhase));
    const g2=ctx.createRadialGradient(0,0,r*.5,0,0,r*2.5);
    g2.addColorStop(0, hexAlpha(this.type.col1, .4+glow*.4));
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(0,0,r*2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.7,-r*.2);ctx.lineTo(r*.7,r*.2);ctx.lineTo(0,r);ctx.lineTo(-r*.7,r*.2);ctx.lineTo(-r*.7,-r*.2);ctx.closePath();
    const dg=ctx.createLinearGradient(0,-r,0,r);
    dg.addColorStop(0,'#ffffff');dg.addColorStop(0.3,this.type.col1);dg.addColorStop(0.7,this.type.col2);dg.addColorStop(1,this.type.col1);
    ctx.fillStyle=dg;ctx.fill();
    ctx.beginPath();ctx.moveTo(0,-r*.5);ctx.lineTo(r*.35,-r*.1);ctx.lineTo(0,r*.3);ctx.lineTo(-r*.35,-r*.1);ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-r);ctx.lineTo(r*.7,-r*.2);ctx.lineTo(r*.7,r*.2);ctx.lineTo(0,r);ctx.lineTo(-r*.7,r*.2);ctx.lineTo(-r*.7,-r*.2);ctx.closePath();ctx.stroke();
    ctx.restore();
    ctx.save();ctx.globalAlpha=this.alpha*(.6+Math.abs(Math.sin(this.glowPhase))*.4);
    ctx.fillStyle=this.type.col1;ctx.font='bold 8px Exo 2, sans-serif';ctx.textAlign='center';
    ctx.fillText(this.type.label, x, y-r-6);ctx.restore();
  }
  getBounds(){return{x:this.x-this.r,y:this.y-this.r,w:this.r*2,h:this.r*2};}
}
// ═══════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════
function spawnParticles(x,y,n,color,vxRange,vyRange,life,size){
  for(let i=0;i<n;i++){
    particles.push({x,y,vx:vxRange[0]+Math.random()*(vxRange[1]-vxRange[0]),vy:vyRange[0]+Math.random()*(vyRange[1]-vyRange[0]),color,life,maxLife:life,size});
  }
}
function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life--;
    const a=p.life/p.maxLife;
    ctx.globalAlpha=a;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    return p.life>0;
  });
}
// ═══════════════════════════════════════════════════
//  BACKGROUND
// ═══════════════════════════════════════════════════
function drawBG(){
  bgOffset+=gameSpeed*0.3;
  const sky=ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#0a0f2e');sky.addColorStop(.5,'#0d2b6e');sky.addColorStop(1,'#0d5e33');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.6)';
  for(let i=0;i<100;i++){
    const sx=((i*173+bgOffset*.1)%W);
    const sy=(i*67)%(GROUND*.55);
    const bright=(Math.sin(frameCount*.05+i)>.8)?2:1;
    ctx.fillRect(sx,sy,bright,bright);
  }
  const moonX=W*.8,moonY=80;
  const moonGrad=ctx.createRadialGradient(moonX,moonY,5,moonX,moonY,45);
  moonGrad.addColorStop(0,'rgba(255,255,220,.9)');moonGrad.addColorStop(1,'rgba(180,180,100,0)');
  ctx.fillStyle=moonGrad;ctx.beginPath();ctx.arc(moonX,moonY,45,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,200,.7)';ctx.beginPath();ctx.arc(moonX,moonY,32,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.arc(moonX+10,moonY-8,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#132855';
  for(let i=0;i<7;i++){
    const mx=((i*240-bgOffset*.8)%(W+400)+W+400)%(W+400)-200;
    ctx.beginPath();ctx.moveTo(mx,GROUND-20);ctx.lineTo(mx+120,GROUND-160);ctx.lineTo(mx+240,GROUND-20);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(200,220,255,.2)';
    ctx.beginPath();ctx.moveTo(mx+100,GROUND-140);ctx.lineTo(mx+120,GROUND-160);ctx.lineTo(mx+140,GROUND-140);ctx.closePath();ctx.fill();
    ctx.fillStyle='#132855';
  }
  ctx.fillStyle='#0d5033';
  for(let i=0;i<9;i++){
    const hx=((i*190-bgOffset*2)%(W+250)+W+250)%(W+250)-125;
    ctx.beginPath();ctx.arc(hx+95,GROUND+15,100,Math.PI,0);ctx.fill();
  }
  ctx.fillStyle='#0d1a44';
  for(let i=0;i<12;i++){
    const bx=((i*120-bgOffset*1.5)%(W+200)+W+200)%(W+200)-100;
    const bh=40+((i*137)%80);
    ctx.fillRect(bx,GROUND-bh,50,bh);
    ctx.fillStyle='rgba(255,220,100,.15)';
    for(let r=0;r<Math.floor(bh/12);r++)
      for(let c=0;c<3;c++)
        if((r+c+i)%3!==0) ctx.fillRect(bx+6+c*14,GROUND-bh+6+r*12,8,6);
    ctx.fillStyle='#0d1a44';
  }
  ctx.fillStyle='#1a7a3a';ctx.fillRect(0,GROUND,W,H-GROUND);
  const gGrad=ctx.createLinearGradient(0,GROUND,0,GROUND+30);
  gGrad.addColorStop(0,'#22993e');gGrad.addColorStop(1,'#135522');
  ctx.fillStyle=gGrad;ctx.fillRect(0,GROUND,W,14);
  const tw=48;
  ctx.fillStyle='rgba(0,0,0,.12)';
  const off=(bgOffset*gameSpeed/2)%tw;
  for(let i=-1;i<Math.ceil(W/tw)+1;i++){
    if(i%2===0) ctx.fillRect(i*tw-off,GROUND,tw,12);
  }
  ctx.strokeStyle='rgba(100,255,100,.2)';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function handleJump(){if(player)player.jump();}
function handleBoost(){if(player)player.boost();}
function handleAttack(){if(player)player.attack();}
function updateHUD(){
  document.getElementById('hScr').textContent=score;
  document.getElementById('hRing').textContent=rings;
  document.getElementById('hLiv').textContent='❤'.repeat(Math.max(0,lives));
  document.getElementById('hHi').textContent=hi;
  var bfEl=document.getElementById('boost-fill');
  if(player&&player.braking&&gameSpeed<0.5){
    bfEl.style.background='linear-gradient(90deg,#ff4400,#ff8800)';
    bfEl.style.width='100%';
  } else if(player&&player.braking){
    bfEl.style.background='linear-gradient(90deg,#ff6600,#ffaa00)';
  } else {
    bfEl.style.background='linear-gradient(90deg,var(--cyan),var(--blue))';
  }
}
function startGame(){
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('go-screen').classList.add('hidden');
  document.getElementById('char-screen').classList.add('hidden');
  score=0;rings=0;lives=3;boostEnergy=100;invTimer=0;
  frameCount=0;gameSpeed=5;enemies=[];ringItems=[];particles=[];diamonds=[];
  enemyTimer=0;ringTimer=0;enemyDelay=60;diamondTimer=0;activePower=null;powerTimer=0;
  player=new Player(selectedChar);
  const pc=document.getElementById('char-portrait');
  const pctx=pc.getContext('2d');
  pctx.clearRect(0,0,44,44);
  drawChar(pctx,selectedChar,2,2,40,40,0,true,false);
  updateHUD();
  gameRunning=true;
  if(animId) cancelAnimationFrame(animId);
  loop();
}
function endGame(){
  gameRunning=false;
  totalEarned+=score;
  localStorage.setItem('sonicUltTotal',totalEarned);
  if(score>hi){hi=score;localStorage.setItem('sonicUltHi',hi);}
  document.getElementById('go-score').textContent='SCORE: '+score;
  document.getElementById('go-hi').textContent='HI-SCORE: '+hi;
  document.getElementById('go-screen').classList.remove('hidden');
}
function loop(){
  ctx.clearRect(0,0,W,H);
  if(!gameRunning) return;
  frameCount++;
  var targetSpeed=4+Math.min(8,frameCount/900);
  if(activePower&&activePower.id==='speed') targetSpeed*=2.8;
  if(activePower&&activePower.id==='slowmo') targetSpeed*=0.3;
  if(activePower&&activePower.id==='tiny') targetSpeed*=1.5;
  if(!player||!player.braking){
    gameSpeed=Math.min(targetSpeed, gameSpeed+0.05);
  }
  if(gameSpeed>0.5) score+=Math.ceil(gameSpeed*.4);
  drawBG();
  enemyTimer++;
  if(enemyTimer>=enemyDelay){
    enemyTimer=0;
    enemyDelay=Math.max(55,110-score/80);
    enemies.push(new Enemy());
    if(score>2000){var e2=new Enemy();e2.x=W+20+e2.w+Math.random()*120;enemies.push(e2);}
    if(score>3500){var e3=new Enemy();e3.x=W+20+e3.w+Math.random()*200+100;enemies.push(e3);}
  }
  diamondTimer++;
  if(diamondTimer>=220+Math.floor(Math.random()*180) && diamonds.length<2){
    diamondTimer=0;diamonds.push(new Diamond());
  }
  diamonds=diamonds.filter(d=>d.x>-50&&d.alpha>0);
  diamonds.forEach(d=>{d.update(gameSpeed);d.draw();});
  ringTimer++;
  if(ringTimer>=45){
    ringTimer=0;
    const n=4+Math.floor(Math.random()*5);
    const rx=W+20;
    const pattern=Math.floor(Math.random()*3);
    for(let i=0;i<n;i++){
      const ry=pattern===0?GROUND-30:pattern===1?GROUND-30-i*28:GROUND-80+Math.sin(i*.8)*50;
      ringItems.push(new Ring(rx+i*30,ry));
    }
  }
  ringItems=ringItems.filter(r=>r.x>-30&&r.alpha>0);
  diamonds.forEach(d=>{
    if(!d.collected && overlap(player.getBounds(), d.getBounds())){
      d.collected=true;activePower=d.type;powerTimer=d.type.duration;
      spawnParticles(d.x,d.y,30,d.type.col1,[-5,5],[-6,-1],40,8);
      spawnParticles(d.x,d.y,20,d.type.col2,[-4,4],[-5,-1],35,5);
      var pd=document.getElementById('powerDisplay');
      pd.textContent='💎 '+d.type.label+' 💎';pd.style.color=d.type.col1;
      pd.style.textShadow='0 0 20px '+d.type.col1;pd.style.display='block';
      setTimeout(()=>{if(pd)pd.style.display='none';},2000);
    }
  });
  if(powerTimer>0){powerTimer--;if(powerTimer<=0){activePower=null;}}
  ringItems.forEach(r=>{r.update(gameSpeed);r.draw();});
  enemies=enemies.filter(e=>e.x>-80&&!e.dead);
  enemies.forEach(e=>{e.update(gameSpeed);e.draw();});
  player.update();player.draw();
  updateParticles();
  if(invTimer<=0 && !(activePower&&(activePower.id==='ghost'||activePower.id==='invincible'))){
    const pb=player.getBounds();
    const ab=player.getAttackBounds();
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];const eb=e.getBounds();
      if(ab&&e.isEnemy&&overlap(ab,eb)){
        spawnParticles(e.x+e.w/2,e.y+e.h/2,20,'#ffd700',[-4,4],[-5,-1],30,6);
        score+=e.pts||100;enemies.splice(i,1);continue;
      }
      if(e.isEnemy&&pb.y+pb.h>eb.y&&pb.y<eb.y+10&&player.vy>1&&overlap(pb,eb)){
        spawnParticles(e.x+e.w/2,e.y+e.h/2,15,'#ffaa00',[-3,3],[-4,-1],25,5);
        score+=e.pts||100;player.vy=-12;enemies.splice(i,1);continue;
      }
      if(activePower&&activePower.id==='giant'&&e.isEnemy&&overlap(pb,eb)){
        spawnParticles(e.x+e.w/2,e.y+e.h/2,20,'#ff6600',[-4,4],[-5,-1],30,6);
        score+=e.pts*2||200;enemies.splice(i,1);continue;
      }
      if(e.bouncy&&overlap(pb,eb)){player.vy=-22;player.jumps=0;continue;}
      if(!e.bouncy&&e.isEnemy&&overlap(pb,eb)){
        if(rings>0){
          for(let r=0;r<Math.min(rings,10);r++){
            const rr=new Ring(player.x+player.w/2,player.y+player.h/2);
            rr.x+=(Math.random()-.5)*80;rr.y+=(Math.random()-.5)*40;ringItems.push(rr);
          }
          rings=0;
        } else {lives--;if(lives<=0){endGame();return;}}
        spawnParticles(pb.x+pb.w/2,pb.y+pb.h/2,14,'#ff3333',[-4,4],[-5,-1],28,6);
        invTimer=150;break;
      }
      if(!e.isEnemy&&!e.bouncy&&overlap(pb,eb)){
        if(rings>0){rings=0;}else{lives--;if(lives<=0){endGame();return;}}
        spawnParticles(pb.x+pb.w/2,pb.y+pb.h/2,12,'#ff5555',[-4,4],[-4,-1],25,5);
        invTimer=130;break;
      }
    }
  }
  if(invTimer>0) invTimer--;
  const pb2=player.getBounds();
  ringItems.forEach(r=>{
    if(!r.collected&&overlap(pb2,r.getBounds())){
      r.collected=true;
      rings+=(selectedChar.hammer?2:1);
      score+=(activePower&&activePower.id==='score2x'?20:10);
      spawnParticles(r.x,r.y,6,'#ffd700',[-3,3],[-4,-1],18,4);
    }
  });
  updateHUD();
  if(player.boosting){
    ctx.strokeStyle='rgba(100,200,255,.15)';ctx.lineWidth=2;
    for(let l=0;l<8;l++){
      const ly=Math.random()*H;const lx=Math.random()*W*.4+W*.3;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx-80,ly);ctx.stroke();
    }
  }
  animId=requestAnimationFrame(loop);
}
// ═══════════════════════════════════════════════════
//  CHARACTER SELECT UI
// ═══════════════════════════════════════════════════
function showCharScreen(){
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('go-screen').classList.add('hidden');
  document.getElementById('char-screen').classList.add('hidden');
  document.getElementById('total-label').textContent='Totaal verdiend: '+totalEarned+' punten';
  const grid=document.getElementById('charGrid');
  grid.innerHTML='';
  CHARS.forEach(ch=>{
    const unlocked=totalEarned>=ch.unlockAt;
    const card=document.createElement('div');
    card.className='char-card'+(ch===selectedChar?' sel':'')+(unlocked?'':' locked');
    const cv=document.createElement('canvas');
    cv.width=60;cv.height=66;
    const pctx=cv.getContext('2d');
    if(unlocked) drawChar(pctx,ch,10,8,40,50,0,true,false);
    else{pctx.fillStyle='#444';pctx.font='28px serif';pctx.fillText('🔒',16,44);}
    card.appendChild(cv);
    const nm=document.createElement('div');nm.className='char-name';nm.textContent=ch.name;card.appendChild(nm);
    const tg=document.createElement('div');tg.className='char-tag';tg.textContent=ch.tag;card.appendChild(tg);
    if(!unlocked){
      const req=document.createElement('div');req.className='unlock-req';req.textContent='Nodig: '+ch.unlockAt;card.appendChild(req);
      const li=document.createElement('div');li.className='lock-icon';li.textContent='🔒';card.appendChild(li);
    }
    const stats=document.createElement('div');stats.className='stat-bars';
    const statDefs=[
      {label:'SPD',val:(ch.spd-0.8)/1.2,color:'#00ff88'},
      {label:'JMP',val:(-ch.jump-10)/10,color:'#ff8800'},
      {label:'PWR',val:ch.punch||ch.rocket?0.9:ch.hammer?0.8:ch.chaos?1:0.5,color:'#ff3333'},
    ];
    statDefs.forEach(s=>{
      const row=document.createElement('div');row.className='stat-row';
      const lbl=document.createElement('div');lbl.className='stat-label';lbl.textContent=s.label;row.appendChild(lbl);
      const track=document.createElement('div');track.className='stat-track';
      const fill=document.createElement('div');fill.className='stat-fill';
      fill.style.width=Math.min(100,s.val*100)+'%';fill.style.background=s.color;
      track.appendChild(fill);row.appendChild(track);
      stats.appendChild(row);
    });
    card.appendChild(stats);
    if(unlocked) card.onclick=()=>{
      selectedChar=ch;
      document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('sel'));
      card.classList.add('sel');
    };
    grid.appendChild(card);
  });
  document.getElementById('char-screen').classList.remove('hidden');
}
function confirmChar(){
  document.getElementById('char-screen').classList.add('hidden');
  startGame();
}
function backToTitle(){
  document.getElementById('char-screen').classList.add('hidden');
  document.getElementById('title-screen').classList.remove('hidden');
}
