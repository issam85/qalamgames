<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SONIC ULTIMATE</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--blue:#0077ff;--yellow:#ffd700;--red:#ff1133;--cyan:#00ffee;--dark:#03040f;--white:#f0f8ff;--orange:#ff6600;--purple:#9900ff;}
body{background:#000;font-family:'Nunito',sans-serif;overflow:hidden;user-select:none;cursor:none;}
canvas{display:block;position:fixed;inset:0;}
#cur{position:fixed;width:12px;height:12px;border:2px solid var(--yellow);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
#hud{position:fixed;top:0;left:0;right:0;height:52px;background:linear-gradient(180deg,rgba(0,0,0,.85),transparent);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;pointer-events:none;}
.hb{display:flex;flex-direction:column;align-items:center;min-width:60px;}
.hl{font-family:'Bangers',cursive;font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;}
.hv{font-family:'Bangers',cursive;font-size:24px;color:var(--white);line-height:1;}
#bbar{height:6px;background:#111;border:1px solid #333;border-radius:3px;overflow:hidden;margin-top:3px;width:100px;}
#bfill{height:100%;width:100%;background:linear-gradient(90deg,var(--cyan),var(--blue));border-radius:3px;transition:width .1s;}
#portrait{border:2px solid var(--yellow);border-radius:50%;box-shadow:0 0 10px var(--yellow);}
#powerDisplay{position:fixed;top:58px;left:50%;transform:translateX(-50%);font-family:'Bangers',cursive;font-size:20px;letter-spacing:3px;pointer-events:none;z-index:101;display:none;text-align:center;text-shadow:0 0 18px currentColor;animation:pdPop .3s ease-out;}
@keyframes pdPop{from{transform:translateX(-50%) scale(1.4);}to{transform:translateX(-50%) scale(1);}}
#levelBanner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bangers',cursive;font-size:clamp(40px,8vw,90px);letter-spacing:4px;pointer-events:none;z-index:300;display:none;text-align:center;text-shadow:0 0 40px currentColor;animation:lbAnim .6s ease-out;}
@keyframes lbAnim{from{transform:translate(-50%,-50%) scale(1.8);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;}
.screen.hidden{display:none;}
#ts{background:radial-gradient(ellipse at 50% 40%,#001a4d,#000);}
.tlogo{font-family:'Bangers',cursive;font-size:clamp(60px,13vw,150px);letter-spacing:5px;line-height:.85;text-align:center;background:linear-gradient(180deg,#fff 0%,var(--blue) 40%,#003399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 30px #0055ff);animation:lf 3s ease-in-out infinite;}
.tsub{font-family:'Bangers',cursive;font-size:clamp(18px,3.5vw,38px);color:var(--yellow);letter-spacing:8px;text-shadow:0 0 18px var(--yellow);margin-bottom:36px;animation:bl 1.4s infinite;}
@keyframes lf{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes sr{to{transform:rotate(360deg)}}
.rdeco{width:72px;height:72px;border:5px solid var(--yellow);border-radius:50%;box-shadow:0 0 28px var(--yellow),inset 0 0 18px rgba(255,215,0,.3);animation:sr 2s linear infinite;margin-bottom:16px;}
.br{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.btn{font-family:'Bangers',cursive;font-size:17px;letter-spacing:2px;padding:11px 26px;border:2px solid;border-radius:6px;cursor:pointer;transition:all .14s;text-transform:uppercase;}
.bp{background:linear-gradient(135deg,var(--blue),#003aaa);color:#fff;border-color:var(--cyan);box-shadow:0 0 18px rgba(0,119,255,.4);}
.bp:hover{transform:scale(1.06);box-shadow:0 0 32px rgba(0,200,255,.6);}
.bs{background:rgba(255,255,255,.05);color:var(--yellow);border-color:var(--yellow);}
.bs:hover{transform:scale(1.06);background:rgba(255,215,0,.1);}
#cs{overflow-y:auto;background:radial-gradient(ellipse at center,#050a20,#000);}
#cs h2{font-family:'Bangers',cursive;font-size:clamp(26px,4.5vw,50px);color:var(--yellow);letter-spacing:4px;text-shadow:0 0 18px var(--yellow);margin-bottom:5px;}
#cs p{color:#888;font-size:11px;margin-bottom:16px;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;max-width:860px;width:90%;padding:8px;}
.cc{border:2px solid #222;border-radius:10px;padding:10px 7px;cursor:pointer;text-align:center;transition:all .18s;background:rgba(255,255,255,.03);}
.cc:hover,.cc.sel{border-color:var(--yellow);background:rgba(255,215,0,.07);transform:translateY(-3px);box-shadow:0 0 18px rgba(255,215,0,.3);}
.cc.lkd{opacity:.4;cursor:not-allowed;}
.cc.lkd:hover{transform:none;border-color:#333;background:none;}
.cc canvas{display:block;margin:0 auto 5px;}
.cn{font-family:'Bangers',cursive;font-size:13px;color:#fff;letter-spacing:1px;}
.ct{font-size:8px;color:#666;margin-top:2px;line-height:1.4;white-space:pre-line;}
.cc.sel .cn{color:var(--yellow);}
.ur{font-size:8px;color:#f88;margin-top:2px;}
.sbars{margin-top:5px;}
.srow{display:flex;align-items:center;gap:3px;margin-bottom:2px;}
.slbl{font-size:7px;color:#555;width:18px;text-align:right;}
.strk{flex:1;height:3px;background:#111;border-radius:2px;overflow:hidden;}
.sfil{height:100%;border-radius:2px;}
#ls{background:radial-gradient(ellipse at center,#0a0520,#000);}
#ls h2{font-family:'Bangers',cursive;font-size:clamp(26px,4.5vw,50px);color:var(--cyan);letter-spacing:4px;text-shadow:0 0 18px var(--cyan);margin-bottom:20px;}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;max-width:700px;width:90%;}
.lcard{border:2px solid #333;border-radius:12px;padding:18px 14px;cursor:pointer;text-align:center;transition:all .2s;background:rgba(255,255,255,.03);position:relative;overflow:hidden;}
.lcard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;}
.lcard:hover{transform:translateY(-4px);border-color:var(--cyan);}
.lcard:hover::before{opacity:1;}
.lcard.lkd{opacity:.4;cursor:not-allowed;}
.lcard.lkd:hover{transform:none;}
.licon{font-size:36px;margin-bottom:8px;}
.lname{font-family:'Bangers',cursive;font-size:18px;letter-spacing:2px;color:#fff;}
.ldesc{font-size:10px;color:#888;margin-top:4px;line-height:1.5;}
.lreq{font-size:9px;color:#f88;margin-top:6px;}
.lbadge{position:absolute;top:8px;right:8px;font-size:9px;font-family:'Bangers',cursive;letter-spacing:1px;padding:2px 6px;border-radius:4px;}
#gos{background:radial-gradient(ellipse at center,#200000,#000);}
#gos h2{font-family:'Bangers',cursive;font-size:clamp(38px,7vw,86px);color:var(--red);text-shadow:0 0 28px var(--red);animation:bl 1s infinite;}
#gosc{font-family:'Bangers',cursive;font-size:26px;color:var(--yellow);margin:9px 0 4px;}
#gohi{font-family:'Bangers',cursive;font-size:17px;color:#888;margin-bottom:28px;}
#lwon{background:radial-gradient(ellipse at center,#002010,#000);}
#lwon h2{font-family:'Bangers',cursive;font-size:clamp(36px,7vw,80px);color:#00ff88;text-shadow:0 0 28px #00ff88;animation:lf 1s ease-in-out infinite;}
#lwon .stats{font-family:'Bangers',cursive;font-size:20px;color:#ccc;margin:10px 0 24px;line-height:1.8;}
#lwon .stats span{color:var(--yellow);}
#ctrls{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:100;pointer-events:none;}
.ch{font-family:'Bangers',cursive;font-size:9px;color:#444;letter-spacing:1px;background:rgba(0,0,0,.5);padding:3px 8px;border-radius:4px;border:1px solid #222;}
</style>
</head>
<body>
<div id="cur"></div>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hb"><div class="hl">Score</div><div class="hv" id="hS">0</div></div>
  <div class="hb"><canvas id="portrait" width="40" height="40"></canvas></div>
  <div class="hb"><div class="hl">Rings</div><div class="hv" style="color:var(--yellow)" id="hR">0</div></div>
  <div class="hb"><div class="hl">Boost</div><div id="bbar"><div id="bfill"></div></div></div>
  <div class="hb"><div class="hl">Levens</div><div class="hv" style="color:var(--red)" id="hL">❤❤❤</div></div>
  <div class="hb"><div class="hl">Hi-Score</div><div class="hv" style="color:#aaa;font-size:16px;" id="hH">0</div></div>
  <div class="hb"><div class="hl">Vijanden</div><div class="hv" style="color:#ff4444;font-size:16px;" id="hE">0</div></div>
</div>
<div id="powerDisplay"></div>
<div id="comboEl" style="position:fixed;top:58px;right:16px;font-family:'Bangers',cursive;font-size:22px;letter-spacing:2px;pointer-events:none;z-index:102;display:none;text-shadow:0 0 12px currentColor;animation:pdPop .2s ease-out;"></div>
<div id="levelBanner"></div>
<div class="screen" id="ts">
  <div class="rdeco"></div>
  <div class="tlogo">SONIC</div>
  <div class="tsub">ULTIMATE</div>
  <div class="br">
    <button class="btn bp" onclick="showLS()">▶ SPELEN</button>
    <button class="btn bs" onclick="showCS()">👤 KARAKTERS</button>
  </div>
  <div style="margin-top:14px;font-size:9px;color:#333;font-family:'Bangers',cursive;letter-spacing:2px;">SPATIE SPRINGEN • X BOOST • Z AANVAL • ↓ REMMEN</div>
</div>
<div class="screen hidden" id="cs">
  <h2>KIES JE HELD</h2>
  <p id="tlbl">Totaal verdiend: 0 punten</p>
  <div class="cgrid" id="cg"></div>
  <div class="br" style="margin-top:14px;">
    <button class="btn bp" onclick="confirmChar()">✓ SPELEN</button>
    <button class="btn bs" onclick="backTitle()">← TERUG</button>
  </div>
</div>
<div class="screen hidden" id="ls">
  <h2>KIES JE LEVEL</h2>
  <div class="lgrid" id="lg"></div>
  <div class="br" style="margin-top:14px;">
    <button class="btn bs" onclick="backTitle()">← TERUG</button>
  </div>
</div>
<div class="screen hidden" id="gos">
  <h2>GAME OVER</h2>
  <div id="gosc"></div>
  <div id="gohi"></div>
  <div class="br">
    <button class="btn bp" onclick="restartLevel()">▶ OPNIEUW</button>
    <button class="btn bs" onclick="showLS()">🗺 LEVELS</button>
    <button class="btn bs" onclick="showCS()">👤 KARAKTER</button>
  </div>
</div>
<div class="screen hidden" id="lwon">
  <h2>LEVEL KLAAR! 🎉</h2>
  <div class="stats" id="wonStats"></div>
  <div class="br">
    <button class="btn bp" id="nextBtn" onclick="nextLevel()">VOLGENDE ▶</button>
    <button class="btn bs" onclick="showLS()">🗺 LEVELS</button>
  </div>
</div>
<div id="ctrls">
  <div class="ch">SPATIE/↑ SPRINGEN</div>
  <div class="ch">X BOOST</div>
  <div class="ch">Z AANVAL</div>
  <div class="ch">↓ REMMEN</div>
</div>
<script>
