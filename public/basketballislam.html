let mode=3,tA=0,tB=1,pvp=false;let score=[0,0],half=1,timeLeft=180;let ps=[],ball={x:0,y:0,vx:0,vy:0,active:false,_arc:null,_scale:1,_target:null};let shot=null,keys={},tick=0,quiz=null,qAns=null,flash=null;let timerIv=null,animId=null,prevSpace=false,prevEnter=false;
function ct(){const co=COURTS[mode-1];const ox=(CW-co.w)/2,oy=(CH-co.h)/2;return{...co,ox,oy,cx:CW/2,cy:CH/2,hoopL:{x:ox+22,y:CH/2},hoopR:{x:ox+co.w-22,y:CH/2}};}function mkP(x,y,team,ai,num,t){return{x,y,team,ai,num,c1:t.c1,c2:t.c2,hasBall:false,face:team===0?0:Math.PI,shootCD:0,stealCD:0,aiT:0,speed:ai?1.8+Math.random()*0.4:0};}function spawn(){const c=ct(),n=mode,t0=TEAMS[tA],t1=TEAMS[tB];ps=[];for(let i=0;i<n;i++){ps.push(mkP(c.ox+c.w*0.25,c.cy+(i-(n-1)/2)*50,0,i>0,i+1,t0));}for(let i=0;i<n;i++){ps.push(mkP(c.ox+c.w*0.75,c.cy+(i-(n-1)/2)*50,1,!pvp||i>0,i+1,t1));}ps[0].hasBall=true;ball={x:0,y:0,vx:0,vy:0,active:false,_arc:null,_scale:1,_target:null};shot=null;}function fmt(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0");}

);ctx.strokeStyle="#ff4400";ctx.lineWidth=3;ctx.beginPath();ctx.arc(c.hoopL.x+14,c.cy,10,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(c.hoopR.x-14,c.cy,10,0,Math.PI*2);ctx.stroke();ctx.fillStyle="rgba(255,68,0,0.15)";ctx.beginPath();ctx.arc(c.hoopL.x+14,c.cy,8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(c.hoopR.x-14,c.cy,8,0,Math.PI*2);ctx.fill();}
function drawPlayer(p,isH,t){const{x,y,c1,c2,num,hasBall,face}=p;const dir=Math.cos(face)>=0?1:-1;ctx.fillStyle="rgba(0,0,0,0.22)";ctx.beginPath();ctx.ellipse(x,y+22,14,5,0,0,Math.PI*2);ctx.fill();const ls=Math.sin(t*0.12)*3;ctx.strokeStyle=c1;ctx.lineWidth=4;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(x-5,y+4);ctx.lineTo(x-7-ls,y+20);ctx.stroke();ctx.beginPath();ctx.moveTo(x+5,y+4);ctx.lineTo(x+7+ls,y+20);ctx.stroke();ctx.fillStyle="#222";ctx.fillRect(x-11-ls,y+18,7,4);ctx.fillRect(x+3+ls,y+18,7,4);ctx.fillStyle=c2;ctx.fillRect(x-9,y-2,18,8);ctx.fillStyle=c1;ctx.beginPath();ctx.roundRect(x-11,y-18,22,18,3);ctx.fill();ctx.strokeStyle=c2;ctx.lineWidth=1;ctx.stroke();ctx.fillStyle=c2;ctx.font="bold 10px monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(num,x,y-9);ctx.fillStyle="#c48a5c";ctx.beginPath();ctx.arc(x,y-24,7,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#c48a5c";ctx.lineWidth=3.5;ctx.lineCap="round";if(hasBall){ctx.beginPath();ctx.moveTo(x+dir*10,y-14);ctx.lineTo(x+dir*20,y-18);ctx.stroke();ctx.beginPath();ctx.moveTo(x-dir*10,y-14);ctx.lineTo(x-dir*14,y-8);ctx.stroke();const bounce=Math.abs(Math.sin(t*0.18))*8,ballR=6.5+Math.abs(Math.sin(t*0.18))*1.5,bx=x+dir*22,by=y-16+bounce;ctx.fillStyle="rgba(0,0,0,0.12)";ctx.beginPath();ctx.ellipse(bx,y+20,ballR,3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#e07020";ctx.beginPath();ctx.arc(bx,by,ballR,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#6b3510";ctx.lineWidth=1.5;ctx.stroke();ctx.strokeStyle="#a05818";ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(bx-ballR,by);ctx.lineTo(bx+ballR,by);ctx.stroke();}else{ctx.beginPath();ctx.moveTo(x+10,y-14);ctx.lineTo(x+13,y-6);ctx.stroke();ctx.beginPath();ctx.moveTo(x-10,y-14);ctx.lineTo(x-13,y-6);ctx.stroke();}if(isH){ctx.fillStyle="#FDB927";ctx.font="bold 9px monospace";ctx.textAlign="center";ctx.fillText(isH===1?"▼ P1":"▼ P2",x,y-36);}}

function drawShotBar(s,px,py){if(!s)return;const bw=80,bh=10,bx=px-bw/2,by=py-48;ctx.fillStyle="rgba(0,0,0,0.7)";ctx.fillRect(bx-2,by-2,bw+4,bh+4);ctx.fillStyle="#cc2222";ctx.fillRect(bx,by,bw,bh);ctx.fillStyle="#22cc44";ctx.fillRect(bx+(s.greenStart/100)*bw,by,((s.greenEnd-s.greenStart)/100)*bw,bh);const mx=bx+(s.progress/100)*bw;ctx.fillStyle="#fff";ctx.fillRect(mx-2,by-3,4,bh+6);ctx.strokeStyle="#000";ctx.lineWidth=1;ctx.strokeRect(mx-2,by-3,4,bh+6);ctx.strokeStyle="#fff8";ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);}
function handleScore(teamIdx,pts){score[teamIdx]+=pts;updateHUD();const name=TEAMS[teamIdx===0?tA:tB].name;flash={text:`${pts} PUNTEN — ${name}`,timer:80};ball.active=false;shot=null;spawn();}function attemptShot(p){const c=ct(),target=p.team===0?c.hoopR:c.hoopL;const dx=target.x-p.x,dy=target.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);const ratio=Math.max(0,1-dist/(c.w*0.85)),greenW=12+ratio*28,center=45+Math.random()*10;shot={player:p,progress:0,greenStart:center-greenW/2,greenEnd:center+greenW/2,dist,team:p.team};p.face=Math.atan2(dy,dx);}function resolveShot(s){const p=s.player,inGreen=s.progress>=s.greenStart&&s.progress<=s.greenEnd;shot=null;const c=ct(),target=p.team===0?c.hoopR:c.hoopL;const rimX=target.x+(p.team===0?14:-14),rimY=target.y,arcR=c.h*0.42,pts=s.dist>arcR?3:2;const missOff=inGreen?0:(Math.random()-0.5)*40;ball.x=p.x+Math.cos(p.face)*18;ball.y=p.y+Math.sin(p.face)*18;ball.active=true;ball._arc={sx:ball.x,sy:ball.y,tx:rimX+missOff,ty:rimY+(inGreen?0:missOff*0.5),frame:0,totalFrames:30+Math.floor(s.dist*0.08),willScore:inGreen,team:p.team,pts,height:s.dist*0.3};ball.vx=0;ball.vy=0;p.hasBall=false;p.shootCD=40;}function doPass(from){const mates=ps.filter(p=>p.team===from.team&&p!==from);if(!mates.length)return;let best=mates[0],minD=1e9;mates.forEach(m=>{const d=Math.hypot(m.x-from.x,m.y-from.y);if(d<minD){minD=d;best=m;}});const dx=best.x-from.x,dy=best.y-from.y,d=Math.hypot(dx,dy)||1;from.face=Math.atan2(dy,dx);ball.x=from.x+Math.cos(from.face)*18;ball.y=from.y+Math.sin(from.face)*18;ball.vx=(dx/d)*7;ball.vy=(dy/d)*7;ball.active=true;ball._target=best;ball._arc=null;from.hasBall=false;}function trySteal(stealer){const carrier=ps.find(p=>p.hasBall&&p.team!==stealer.team);if(!carrier||stealer.stealCD>0)return;if(Math.hypot(stealer.x-carrier.x,stealer.y-carrier.y)>36)return;stealer.stealCD=120;if(Math.random()<0.18){carrier.hasBall=false;stealer.hasBall=true;ball.active=false;}}
function gameLoop(){const c=ct(),n=ps.length/2;tick++;const human=ps[0];const p2=pvp?ps[n]:null;const spaceNow=!!keys[" "],spaceP=spaceNow&&!prevSpace;prevSpace=spaceNow;const enterNow=!!keys["Enter"],enterP=enterNow&&!prevEnter;prevEnter=enterNow;if(!quiz){if(!shot||shot.player!==human){let dx=0,dy=0;if(keys["a"]||keys["A"])dx-=1;if(keys["d"]||keys["D"])dx+=1;if(keys["w"]||keys["W"])dy-=1;if(keys["s"]||keys["S"])dy+=1;if(dx||dy){const len=Math.sqrt(dx*dx+dy*dy);human.x+=(dx/len)*2.6;human.y+=(dy/len)*2.6;human.face=Math.atan2(dy,dx);}}human.shootCD=Math.max(0,human.shootCD-1);human.stealCD=Math.max(0,human.stealCD-1);if(spaceP){if(shot&&shot.player===human)resolveShot(shot);else if(!shot&&human.hasBall&&human.shootCD<=0)attemptShot(human);}if(keys["e"]||keys["E"]){keys["e"]=false;keys["E"]=false;if(human.hasBall&&!shot)doPass(human);}if(keys["q"]||keys["Q"]){keys["q"]=false;keys["Q"]=false;if(!human.hasBall)trySteal(human);}if(p2&&(!shot||shot.player!==p2)){let dx=0,dy=0;if(keys["ArrowLeft"])dx-=1;if(keys["ArrowRight"])dx+=1;if(keys["ArrowUp"])dy-=1;if(keys["ArrowDown"])dy+=1;if(dx||dy){const len=Math.sqrt(dx*dx+dy*dy);p2.x+=(dx/len)*2.6;p2.y+=(dy/len)*2.6;p2.face=Math.atan2(dy,dx);}}if(p2){p2.shootCD=Math.max(0,p2.shootCD-1);p2.stealCD=Math.max(0,p2.stealCD-1);if(enterP){if(shot&&shot.player===p2)resolveShot(shot);else if(!shot&&p2.hasBall&&p2.shootCD<=0)attemptShot(p2);}if(keys["o"]||keys["O"]){keys["o"]=false;keys["O"]=false;if(p2.hasBall&&!shot)doPass(p2);}if(keys["p"]||keys["P"]){keys["p"]=false;keys["P"]=false;if(!p2.hasBall)trySteal(p2);}}if(shot){shot.progress+=1.0;if(shot.progress>=100)resolveShot(shot);}ps.forEach((p,i)=>{if(!p.ai)return;p.shootCD=Math.max(0,p.shootCD-1);p.stealCD=Math.max(0,p.stealCD-1);p.aiT=Math.max(0,p.aiT-1);if(shot&&shot.player===p)return;const myHoop=p.team===0?c.hoopR:c.hoopL,carrier=ps.find(pp=>pp.hasBall),spd=p.speed||2.0;const moveTo=(tx,ty,s)=>{const dx=tx-p.x,dy=ty-p.y,d=Math.hypot(dx,dy);if(d>4){p.x+=(dx/d)*s;p.y+=(dy/d)*s;p.face=Math.atan2(dy,dx);}};if(p.hasBall){moveTo(myHoop.x+(p.team===0?-60:60),myHoop.y+(i%n-1)*30,spd);}else if(carrier&&carrier.team!==p.team){const mi=i%n;if(mi===0)moveTo(carrier.x,carrier.y,spd+0.3);else{const opp=ps.filter(pp=>pp.team!==p.team)[mi]||carrier;moveTo(opp.x+(p.team===0?-20:20),opp.y,spd);}}else if(ball.active&&!carrier&&!ball._arc){moveTo(ball.x,ball.y,spd+0.2);if(Math.hypot(p.x-ball.x,p.y-ball.y)<20){p.hasBall=true;ball.active=false;}}else if(carrier&&carrier.team===p.team){const off=(i%n)*60-30,tx=(carrier.x+myHoop.x)/2;moveTo(tx,c.cy+off,spd*0.7);}else{moveTo(p.team===0?c.cx-60:c.cx+60,c.cy+((i%n)-(n-1)/2)*55,1.5);}p.x=Math.max(c.ox+PR,Math.min(c.ox+c.w-PR,p.x));p.y=Math.max(c.oy+PR,Math.min(c.oy+c.h-PR,p.y));if(p.aiT<=0){p.aiT=12+Math.floor(Math.random()*10);if(p.hasBall){const dist=Math.hypot(p.x-myHoop.x,p.y-myHoop.y);if(dist<180&&p.shootCD<=0&&Math.random()<0.3&&!shot){attemptShot(p);setTimeout(()=>{if(shot&&shot.player===p){shot.progress=(shot.greenStart+shot.greenEnd)/2+(Math.random()-0.5)*20;resolveShot(shot);}},400+Math.random()*300);}else if(n>1&&Math.random()<0.2&&!shot)doPass(p);}else if(carrier&&carrier.team!==p.team&&Math.hypot(p.x-carrier.x,p.y-carrier.y)<40)trySteal(p);}});}[human,p2].forEach(p=>{if(!p)return;p.x=Math.max(c.ox+PR,Math.min(c.ox+c.w-PR,p.x));p.y=Math.max(c.oy+PR,Math.min(c.oy+c.h-PR,p.y));});if(ball.active){if(ball._arc){const a=ball._arc;a.frame++;const t=a.frame/a.totalFrames;ball.x=a.sx+(a.tx-a.sx)*t;ball.y=a.sy+(a.ty-a.sy)*t-Math.sin(t*Math.PI)*a.height;ball._scale=1+Math.sin(t*Math.PI)*0.6;if(a.frame>=a.totalFrames){ball._scale=1;if(a.willScore){ball._arc=null;handleScore(a.team,a.pts);}else{ball._arc=null;ball.vx=(Math.random()-0.5)*5;ball.vy=(Math.random()-0.5)*5;}}}else{ball.x+=ball.vx;ball.y+=ball.vy;ball.vx*=0.97;ball.vy*=0.97;ball._scale=1;}if(!ball._arc&&ball._target){const t=ball._target;if(Math.hypot(ball.x-t.x,ball.y-t.y)<22){t.hasBall=true;ball.active=false;const ti=ps.indexOf(t);if(ti>0&&t.team===ps[0].team){t.ai=false;ps[0].ai=true;[ps[0],ps[ti]]=[ps[ti],ps[0]];}if(pvp&&ti>0&&t.team===ps[n].team){const p2i=ps.indexOf(t);if(p2i!==n){t.ai=false;ps[n].ai=true;[ps[n],ps[p2i]]=[ps[p2i],ps[n]];}}ball._target=null;}}if(!ball._arc&&Math.hypot(ball.vx,ball.vy)<1.5){let closest=null,minD=30;ps.forEach(p=>{if(p.hasBall)return;const d=Math.hypot(p.x-ball.x,p.y-ball.y);if(d<minD){minD=d;closest=p;}});if(closest){closest.hasBall=true;ball.active=false;}}if(!ball._arc){if(ball.x<c.ox||ball.x>c.ox+c.w){ball.vx*=-0.5;ball.x=Math.max(c.ox,Math.min(c.ox+c.w,ball.x));}if(ball.y<c.oy||ball.y>c.oy+c.h){ball.vy*=-0.5;ball.y=Math.max(c.oy,Math.min(c.oy+c.h,ball.y));}}}drawCourt(c);ps.forEach(p=>drawPlayer(p,p===human?1:p===p2?2:0,tick));drawBall();if(shot)drawShotBar(shot,shot.player.x,shot.player.y);if(flash){flash.timer--;if(flash.timer>0){const al=Math.min(1,flash.timer/40);ctx.fillStyle=`rgba(253,185,39,${al*0.12})`;ctx.fillRect(c.ox,c.oy,c.w,c.h);ctx.fillStyle=`rgba(253,185,39,${al})`;ctx.font="bold 36px monospace";ctx.textAlign="center";ctx.fillText("🏀 SCORE!",c.cx,c.cy-14);ctx.font="bold 20px monospace";ctx.fillText(flash.text,c.cx,c.cy+20);}else flash=null;}animId=requestAnimationFrame(gameLoop);}
function showScreen(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}function updateHUD(){document.getElementById("hudPtsA").textContent=score[0];document.getElementById("hudPtsB").textContent=score[1];document.getElementById("hudClock").textContent=fmt(timeLeft);document.getElementById("hudHalf").textContent=`HELFT ${half}/2`;}
function buildMenu(){const modes=[1,2,3,4,5];const modeCol=document.getElementById("modeCol");modeCol.innerHTML="<label>MODUS</label>";modes.forEach((m)=>{const b=document.createElement("button");b.textContent=m+"v"+m;if(mode===m){b.classList.add("on");b.style.background="#FDB927";b.style.color="#000";}b.onclick=()=>{mode=m;buildMenu();};modeCol.appendChild(b);});["teamACol","teamBCol"].forEach((colId,ci)=>{const col=document.getElementById(colId);col.innerHTML=`<label>TEAM ${ci===0?"A":"B"}</label>`;TEAMS.forEach((t,i)=>{const sel=ci===0?tA:tB;const b=document.createElement("button");b.textContent=t.name;if(sel===i){b.classList.add("on");b.style.background=t.c1;b.style.color=t.c2;b.style.borderColor="#FDB92788";}b.onclick=()=>{if(ci===0)tA=i;else tB=i;buildMenu();};col.appendChild(b);});});const pb=document.getElementById("btnPvp");pb.textContent=pvp?"VS SPELER ✓":"VS AI";pb.className=pvp?"on":"";pb.style.background=pvp?"#FDB927":"transparent";pb.style.color=pvp?"#000":"#FDB927";}
function buildControls(){const bar=document.getElementById("ctrlBar");const ctrls=pvp?[["WASD","P1 Beweeg"],["SPATIE","P1 Schiet"],["E","P1 Pass"],["Q","P1 Steel"],["Pijltjes","P2 Beweeg"],["ENTER","P2 Schiet"],["O","P2 Pass"],["P","P2 Steel"]]:[["WASD / Pijltjes","Bewegen"],["SPATIE","Schieten"],["E","Passen"],["Q","Stelen"]];bar.innerHTML=ctrls.map(([k,l])=>`<div class="ctrl"><kbd>${k}</kbd><span>${l}</span></div>`).join("");}
function startGame(){score=[0,0];half=1;timeLeft=180;quiz=null;qAns=null;flash=null;shot=null;tick=0;keys={};prevSpace=false;prevEnter=false;spawn();showScreen("game");const ta=TEAMS[tA],tb=TEAMS[tB];document.getElementById("hudBadgeA").style.cssText=`width:18px;height:18px;border-radius:9px;background:${ta.c1};border:2px solid ${ta.c2}`;document.getElementById("hudBadgeB").style.cssText=`width:18px;height:18px;border-radius:9px;background:${tb.c1};border:2px solid ${tb.c2}`;document.getElementById("hudNameA").textContent=ta.name.toUpperCase();document.getElementById("hudNameB").textContent=tb.name.toUpperCase();updateHUD();buildControls();if(timerIv)clearInterval(timerIv);timerIv=setInterval(()=>{if(quiz)return;timeLeft--;if(timeLeft>0&&timeLeft%60===0)popQuiz();if(timeLeft<=0){if(half===1){half=2;timeLeft=180;spawn();}else{clearInterval(timerIv);showResult();cancelAnimationFrame(animId);return;}}updateHUD();},1000);if(animId)cancelAnimationFrame(animId);animId=requestAnimationFrame(gameLoop);}
function showResult(){showScreen("result");const ta=TEAMS[tA],tb=TEAMS[tB];document.getElementById("resBadgeA").style.cssText=`width:24px;height:24px;border-radius:12px;background:${ta.c1};border:3px solid ${ta.c2};margin:0 auto 10px`;document.getElementById("resBadgeB").style.cssText=`width:24px;height:24px;border-radius:12px;background:${tb.c1};border:3px solid ${tb.c2};margin:0 auto 10px`;document.getElementById("resNameA").textContent=ta.name.toUpperCase();document.getElementById("resNameA").style.color=ta.c2;document.getElementById("resNameB").textContent=tb.name.toUpperCase();document.getElementById("resNameB").style.color=tb.c2;const va=document.getElementById("resValA"),vb=document.getElementById("resValB");va.textContent=score[0];vb.textContent=score[1];va.className="val"+(score[0]>score[1]?" win":"");vb.className="val"+(score[1]>score[0]?" win":"");document.getElementById("resultMsg").textContent=score[0]>score[1]?ta.name+" wint! 🏆":score[1]>score[0]?tb.name+" wint! 🏆":"Gelijkspel! 🤝";}
function popQuiz(){const q=QS[Math.floor(Math.random()*QS.length)];quiz=q;qAns=null;document.getElementById("qText").textContent=q.q;const opts=document.getElementById("qOpts");opts.innerHTML="";q.o.forEach((o,i)=>{const b=document.createElement("button");b.innerHTML=`<span class="letter">${String.fromCharCode(65+i)}</span>${o}`;b.onclick=()=>answerQuiz(i);opts.appendChild(b);});document.getElementById("qResult").textContent="";document.getElementById("quizOverlay").classList.add("active");}
function answerQuiz(idx){if(qAns!==null)return;qAns=idx;const btns=document.getElementById("qOpts").children;for(let i=0;i<btns.length;i++){if(i===quiz.a)btns[i].classList.add("correct");else if(i===idx)btns[i].classList.add("wrong");}document.getElementById("qResult").textContent=idx===quiz.a?"✅ Correct! مَاشَاءَ ٱللَّٰه":"❌ Fout — antwoord: "+quiz.o[quiz.a];document.getElementById("qResult").style.color=idx===quiz.a?"#2ecc71":"#e74c3c";setTimeout(()=>{quiz=null;qAns=null;document.getElementById("quizOverlay").classList.remove("active");},1500);}
window.addEventListener("keydown",e=>{keys[e.key]=true;if(e.key===" "||e.key==="ArrowUp"||e.key==="ArrowDown")e.preventDefault();});window.addEventListener("keyup",e=>{keys[e.key]=false;});
buildMenu();document.getElementById("btnPlay").onclick=startGame;document.getElementById("btnPvp").onclick=()=>{pvp=!pvp;buildMenu();};document.getElementById("btnAgain").onclick=startGame;document.getElementById("btnMenu").onclick=()=>{if(timerIv)clearInterval(timerIv);if(animId)cancelAnimationFrame(animId);showScreen("menu");};
</script>
