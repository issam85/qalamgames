<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>GRANNY'S NIGHTMARE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Nosifer&family=Amiri:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Creepster', cursive; cursor: none; }
  #cursor { position: fixed; width: 16px; height: 16px; background: radial-gradient(circle, #ff0000, #800000); border-radius: 50%; pointer-events: none; z-index: 9999; box-shadow: 0 0 12px #ff0000; transform: translate(-50%, -50%); }
  #startScreen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
  #startScreen h1 { font-family: 'Nosifer', cursive; font-size: 4.5rem; color: #cc0000; text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000; animation: flicker 1.5s infinite; text-align: center; line-height: 1.1; }
  #startBtn { margin-top: 30px; padding: 15px 50px; font-family: 'Creepster', cursive; font-size: 2rem; background: #1a0000; color: #ff2200; border: 2px solid #ff2200; cursor: pointer; animation: pulse 1s infinite; }
  #startBtn:hover { background: #ff2200; color: #000; }
  @keyframes flicker { 0%,100%{opacity:1} 50%{opacity:0.7} 80%{opacity:0.5} }
  @keyframes pulse { 0%,100%{box-shadow:0 0 20px #ff2200} 50%{box-shadow:0 0 50px #ff2200} }
  #gameContainer { position: fixed; inset: 0; display: none; }
  canvas { display: block; width: 100%; height: 100%; }
  #hud { position: fixed; top: 10px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; pointer-events: none; z-index: 50; }
  #healthBar { width: 200px; height: 22px; background: #1a0000; border: 2px solid #ff0000; box-shadow: 0 0 10px #ff0000; overflow: hidden; }
  #healthFill { height: 100%; background: linear-gradient(90deg, #cc0000, #ff4400); transition: width 0.2s; }
  #scoreDisplay { font-family: 'Creepster', cursive; font-size: 2rem; color: #cc0000; text-shadow: 0 0 10px #ff0000; }
  #waveDisplay { font-family: 'Creepster', cursive; font-size: 1.5rem; color: #880000; text-shadow: 0 0 8px #ff0000; }
  #controls { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); color: #555; font-size: 1rem; text-align: center; pointer-events: none; z-index: 50; }
  #jumpscare { position: fixed; inset: 0; background: #000; display: none; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
  #jumpscare.active { display: flex; animation: scareFlash 0.3s ease; }
  #grannySvg { width: min(90vw, 600px); animation: grannybounce 0.25s infinite alternate; filter: drop-shadow(0 0 40px #ff0000); }
  #jumpscareText { font-family: 'Nosifer', cursive; font-size: 3.5rem; color: #ff0000; margin-top: 20px; text-shadow: 0 0 30px #ff0000; animation: scareTextFlicker 0.2s infinite; text-align:center; }
  @keyframes scareFlash { 0%{background:#fff} 30%{background:#ff0000} 100%{background:#000} }
  @keyframes grannybounce { 0%{transform:scale(1) rotate(-3deg)} 100%{transform:scale(1.08) rotate(3deg)} }
  @keyframes scareTextFlicker { 0%,100%{opacity:1;color:#ff0000} 50%{opacity:0.3;color:#fff} }
  #restartBtn { margin-top: 30px; padding: 12px 40px; font-family: 'Creepster', cursive; font-size: 1.5rem; background: #1a0000; color: #ff2200; border: 2px solid #ff2200; cursor: pointer; display: none; animation: pulse 1s infinite; }
  #restartBtn:hover { background: #ff2200; color: #000; }
  .bloodSplat { position: fixed; pointer-events: none; font-size: 2rem; animation: splatFade 0.6s forwards; z-index: 500; }
  @keyframes splatFade { 0%{opacity:1;transform:scale(0.5)} 100%{opacity:0;transform:scale(2) translateY(-40px)} }
  #hitFlash { position: fixed; inset: 0; background: rgba(255,0,0,0.45); pointer-events: none; opacity: 0; z-index: 200; transition: opacity 0.1s; }

  /* ── Quran Verse Overlay ── */
  #verseOverlay {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    z-index: 300; background: rgba(0,0,0,0.75);
    pointer-events: none;
  }
  #verseOverlay.show { display: flex; pointer-events: auto; }
  #verseBox {
    background: linear-gradient(160deg, #0a1a0a, #1a2a1a);
    border: 2px solid #4caf50;
    border-radius: 16px;
    padding: 30px 36px;
    max-width: 540px; width: 90%;
    text-align: center;
    box-shadow: 0 0 60px rgba(76,175,80,0.4);
    animation: verseAppear 0.5s ease;
  }
  @keyframes verseAppear { 0%{opacity:0;transform:scale(0.85)} 100%{opacity:1;transform:scale(1)} }
  #verseArabic {
    font-family: 'Amiri', serif;
    font-size: 2rem;
    color: #ffd700;
    direction: rtl;
    line-height: 1.6;
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }
  #verseDutch {
    font-family: 'Amiri', serif;
    font-size: 1rem;
    color: #ccc;
    line-height: 1.5;
    margin-bottom: 10px;
  }
  #verseRef {
    font-size: 0.85rem;
    color: #4caf50;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  #verseQuestion {
    font-family: 'Creepster', cursive;
    font-size: 1.2rem;
    color: #fff;
    letter-spacing: 1px;
    margin-bottom: 18px;
  }
  .verse-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .verse-opt {
    background: #0a2a0a; border: 1px solid #2a5a2a; border-radius: 8px;
    padding: 11px 8px; color: #ccc; font-size: 0.95rem; cursor: pointer;
    transition: all .2s; letter-spacing: 1px; font-family: 'Amiri', serif;
  }
  .verse-opt:hover { background: #1a4a1a; border-color: #4caf50; color: #fff; }
  .verse-opt.correct { background: #1a4a1a; border-color: #4caf50; color: #4caf50; font-weight: bold; }
  .verse-opt.wrong { background: #3a0a0a; border-color: #e53935; color: #e53935; }
  #verseResult {
    margin-top: 14px;
    font-family: 'Creepster', cursive;
    font-size: 1.2rem;
    letter-spacing: 2px;
    min-height: 24px;
  }
  #verseContinue {
    margin-top: 12px;
    background: #ffd700; color: #111; border: none;
    padding: 9px 30px; font-family: 'Creepster', cursive;
    font-size: 1.1rem; letter-spacing: 3px; border-radius: 6px;
    cursor: pointer; display: none;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="hitFlash"></div>
<div id="startScreen">
  <h1>GRANNY'S<br>NIGHTMARE</h1>
  <p style="color:#888;font-size:1.3rem;margin:15px 0">Overleef de golven... als je durft 😈</p>
  <p style="color:#550000;font-size:1rem">WASD = Bewegen &nbsp;|&nbsp; PIJLTJES = Schieten in alle richtingen</p>
  <button id="startBtn" onclick="startGame()">SPEEL ALS JE DURFT</button>
</div>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div>
      <div style="color:#cc0000;font-size:0.85rem;margin-bottom:3px">LEVEN</div>
      <div id="healthBar"><div id="healthFill" style="width:100%"></div></div>
    </div>
    <div id="scoreDisplay">SCORE: 0</div>
    <div id="waveDisplay">GOLF: 1</div>
  </div>
  <div id="controls">WASD = Bewegen &nbsp;|&nbsp; ↑ ↓ ← → = Schieten</div>
</div>

<!-- Quran Verse Overlay -->
<div id="verseOverlay">
  <div id="verseBox">
    <div id="verseArabic"></div>
    <div id="verseDutch"></div>
    <div id="verseRef"></div>
    <div id="verseQuestion"></div>
    <div class="verse-opts" id="verseOpts"></div>
    <div id="verseResult"></div>
    <button id="verseContinue" onclick="closeVerse()">▶ VERDER SPELEN</button>
  </div>
</div>

<script>
// ---- CURSOR ----
const cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursorEl.style.left=e.clientX+'px'; cursorEl.style.top=e.clientY+'px'; });

// ---- CANVAS ----
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

// ---- QURAN VERSES (Hizb 1-3: An-Nas 114 t/m Al-Jinn 72) ----

    correct: 1

  {
    arabic: 'قُلْ هُوَ اللَّهُ أَحَدٌ ﴿١﴾ اللَّهُ الصَّمَدُ',
    dutch: 'Zeg: "Hij is Allah, de Enige. Allah, de Onafhankelijke."',
    ref: 'Surah Al-Ikhlas (112:1-2)',
    vraag: 'Wat betekent "As-Samad"?',

let usedVerseIdxs = [];
let versePaused = false;

function getRandomVerse() {
  if (usedVerseIdxs.length >= quranVerses.length) usedVerseIdxs = [];
  let idx;
  do { idx = Math.floor(Math.random() * quranVerses.length); } while (usedVerseIdxs.includes(idx));
  usedVerseIdxs.push(idx);
  return quranVerses[idx];
}

function showVerse() {
  versePaused = true;
  const v = getRandomVerse();
  document.getElementById('verseArabic').textContent = v.arabic;
  document.getElementById('verseDutch').textContent = v.dutch;
  document.getElementById('verseRef').textContent = v.ref;
  document.getElementById('verseQuestion').textContent = v.vraag;
  document.getElementById('verseResult').textContent = '';
  document.getElementById('verseContinue').style.display = 'none';
  const optsEl = document.getElementById('verseOpts');
  optsEl.innerHTML = '';
  v.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'verse-opt';
    btn.textContent = opt;
    btn.onclick = () => answerVerse(i, v.correct, optsEl);
    optsEl.appendChild(btn);
  });
  document.getElementById('verseOverlay').classList.add('show');
}

function answerVerse(chosen, correct, optsEl) {
  optsEl.querySelectorAll('.verse-opt').forEach((b, i) => {
    b.onclick = null;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen) b.classList.add('wrong');
  });
  const res = document.getElementById('verseResult');
  if (chosen === correct) {
    res.style.color = '#4caf50';
    res.textContent = "✓ CORRECT! MASHA'ALLAH! 🌟";
    // Bonus: heal player a bit for correct answer
    if (player) {
      player.hp = Math.min(player.maxHp, player.hp + 15);
      updateHUD();
    }
  } else {
    res.style.color = '#e53935';
    res.textContent = '✗ HELAAS — BLIJF LEREN! 📖';
  }
  document.getElementById('verseContinue').style.display = 'inline-block';
}

function closeVerse() {
  document.getElementById('verseOverlay').classList.remove('show');
  versePaused = false;
}

// ---- STATE ----
let keys = {}, gameRunning = false, gameLoopId;
let player, bullets, enemies, particles, score, wave, bgScroll;
let shootCooldown = 0;
let waveSpawning = false;
let walkCycle = 0; // for abaya sway animation

document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'block';
  initGame();
}

function initGame() {
  score = 0; wave = 1; bgScroll = 0; walkCycle = 0;
  gameRunning = true;
  bullets = []; enemies = []; particles = [];
  waveSpawning = false; shootCooldown = 0;

  player = {
    x: W/2 - 20, y: H/2 - 20,
    w: 40, h: 40,
    hp: 100, maxHp: 100,
    speed: 4,
    invincible: 0,
    facing: 1  // 1=right, -1=left
  };

  updateHUD();
  spawnWave();
  if (gameLoopId) cancelAnimationFrame(gameLoopId);
  loop();
}

// ---- SPAWNING ----
function spawnWave() {
  waveSpawning = true;
  const count = 3 + wave * 2;
  let spawned = 0;
  function spawnOne() {
    if (!gameRunning || spawned >= count) { waveSpawning = false; return; }
    spawnEnemy(); spawned++;
    setTimeout(spawnOne, 600);
  }
  spawnOne();
}

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = Math.random() * W; y = -60; }
  else if (side === 1) { x = Math.random() * W; y = H + 60; }
  else if (side === 2) { x = -60; y = Math.random() * H; }
  else { x = W + 60; y = Math.random() * H; }

  const isBig = Math.random() < 0.25 + wave * 0.05;
  enemies.push({
    x, y,
    w: isBig ? 70 : 45,
    h: isBig ? 70 : 45,
    hp: isBig ? 60 + wave * 20 : 25 + wave * 10,
    maxHp: isBig ? 60 + wave * 20 : 25 + wave * 10,
    speed: isBig ? 1 + wave * 0.15 : 2 + wave * 0.25,
    type: isBig ? 'big' : 'normal',
    attackTimer: 0,
    dying: false, deathTimer: 0,
    angle: 0
  });
}

// ---- GAME LOOP ----
function loop() {
  if (!gameRunning) return;
  if (!versePaused) {
    update();
  }
  draw();
  gameLoopId = requestAnimationFrame(loop);
}

function update() {
  bgScroll += 0.3;

  // -- PLAYER MOVE (WASD) --
  let dx = 0, dy = 0;
  if (keys['KeyA']) dx -= 1;
  if (keys['KeyD']) dx += 1;
  if (keys['KeyW']) dy -= 1;
  if (keys['KeyS']) dy += 1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  player.x += dx * player.speed;
  player.y += dy * player.speed;
  if (dx > 0) player.facing = 1;
  if (dx < 0) player.facing = -1;

  // Walk cycle for abaya animation
  if (dx !== 0 || dy !== 0) walkCycle += 0.15;

  // Keep in bounds
  player.x = Math.max(0, Math.min(W - player.w, player.x));
  player.y = Math.max(0, Math.min(H - player.h, player.y));

  if (player.invincible > 0) player.invincible--;

  // -- SHOOT with ARROW KEYS --
  if (shootCooldown > 0) shootCooldown--;
  const shootSpeed = 12;
  let bvx = 0, bvy = 0;
  if (keys['ArrowLeft'])  { bvx = -shootSpeed; bvy = 0; }
  if (keys['ArrowRight']) { bvx = shootSpeed;  bvy = 0; }
  if (keys['ArrowUp'])    { bvx = 0; bvy = -shootSpeed; }
  if (keys['ArrowDown'])  { bvx = 0; bvy = shootSpeed; }
  // Diagonal shooting
  if (keys['ArrowLeft'] && keys['ArrowUp'])   { bvx = -shootSpeed*0.707; bvy = -shootSpeed*0.707; }
  if (keys['ArrowLeft'] && keys['ArrowDown']) { bvx = -shootSpeed*0.707; bvy = shootSpeed*0.707; }
  if (keys['ArrowRight'] && keys['ArrowUp'])  { bvx = shootSpeed*0.707;  bvy = -shootSpeed*0.707; }
  if (keys['ArrowRight'] && keys['ArrowDown']){ bvx = shootSpeed*0.707;  bvy = shootSpeed*0.707; }

  if ((bvx !== 0 || bvy !== 0) && shootCooldown <= 0) {
    bullets.push({
      x: player.x + player.w/2,
      y: player.y + player.h/2,
      vx: bvx, vy: bvy,
      life: 80,
      trail: []
    });
    shootCooldown = 8;
    playShootSound();
  }

  // -- BULLETS --
  bullets.forEach(b => {
    b.trail.push({x: b.x, y: b.y});
    if (b.trail.length > 6) b.trail.shift();
    b.x += b.vx; b.y += b.vy; b.life--;
  });
  bullets = bullets.filter(b => b.life > 0 && b.x > -20 && b.x < W+20 && b.y > -20 && b.y < H+20);

  // -- BULLET vs ENEMY --
  bullets.forEach((b, bi) => {
    enemies.forEach(e => {
      if (e.dying) return;
      if (b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
        const dmg = e.type === 'big' ? 15 : 20;
        e.hp -= dmg;
        spawnParticles(b.x, b.y, '#cc0000', 8);
        addBloodSplat(b.x, b.y);
        b.life = 0;
        if (e.hp <= 0 && !e.dying) {
          e.dying = true; e.deathTimer = 0;
          score += (e.type === 'big' ? 100 : 50) * wave;
          spawnParticles(e.x+e.w/2, e.y+e.h/2, '#ff2200', 20);
          updateHUD();
        }
      }
    });
  });

  // -- ENEMIES --
  enemies.forEach(e => {
    if (e.dying) { e.deathTimer++; return; }
    e.angle += 0.05;
    const tx = player.x + player.w/2 - e.w/2;
    const ty = player.y + player.h/2 - e.h/2;
    const edx = tx - e.x, edy = ty - e.y;
    const dist = Math.sqrt(edx*edx + edy*edy);
    if (dist > 1) { e.x += (edx/dist)*e.speed; e.y += (edy/dist)*e.speed; }

    // Hit player
    if (player.invincible <= 0) {
      const px = player.x, py = player.y, pw = player.w, ph = player.h;
      if (e.x < px+pw && e.x+e.w > px && e.y < py+ph && e.y+e.h > py) {
        player.hp -= e.type === 'big' ? 10 : 6;
        player.invincible = 50;
        showHitFlash();
        spawnParticles(player.x+pw/2, player.y+ph/2, '#ff0000', 10);
        if (player.hp <= 0) {
          gameRunning = false;
          cancelAnimationFrame(gameLoopId);
          setTimeout(showJumpscare, 400);
        }
        updateHUD();
      }
    }
  });

  enemies = enemies.filter(e => !(e.dying && e.deathTimer > 35));

  // Check wave cleared → show Quran verse between waves
  if (!waveSpawning && enemies.length === 0 && gameRunning) {
    wave++;
    document.getElementById('waveDisplay').textContent = 'GOLF: ' + wave;
    // Show a verse between waves
    showVerse();
    // After verse is closed, spawn next wave
    const checkVerseClosed = setInterval(() => {
      if (!versePaused) {
        clearInterval(checkVerseClosed);
        setTimeout(spawnWave, 800);
      }
    }, 200);
    waveSpawning = true; // prevent double trigger
  }

  // Particles
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; });
  particles = particles.filter(p => p.life > 0);
}

// ---- DRAW ----
function draw() {
  // BG
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
  grad.addColorStop(0, '#0f0008');
  grad.addColorStop(1, '#000000');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Moving blood veins on floor
  ctx.save();
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 12; i++) {
    const ox = (i * 170 + bgScroll * 0.4) % (W + 200) - 100;
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(ox, 0);
    ctx.bezierCurveTo(ox + 80, H*0.3, ox - 60, H*0.6, ox + 40, H);
    ctx.stroke();
  }
  ctx.restore();

  // Blood pools on ground
  ctx.save();
  ctx.globalAlpha = 0.2;
  ctx.fillStyle = '#550000';
  for (let i = 0; i < 7; i++) {
    ctx.beginPath();
    ctx.ellipse(((i*217 + 50) % W), ((i*133 + 80) % H), 35, 18, i*0.5, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Particles
  particles.forEach(p => {
    ctx.save(); ctx.globalAlpha = p.life/40;
    ctx.fillStyle = p.color; ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });

  // Bullet trails + bullets
  bullets.forEach(b => {
    b.trail.forEach((t, i) => {
      ctx.save();
      ctx.globalAlpha = (i / b.trail.length) * 0.5;
      ctx.fillStyle = '#ff4400';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 4 * (i/b.trail.length), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    ctx.save();
    ctx.shadowBlur = 15; ctx.shadowColor = '#ff6600';
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath(); ctx.arc(b.x, b.y, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Player
  drawPlayer();

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.75)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);

  // Wave message
  if (!waveSpawning && enemies.length === 0 && gameRunning) {
    ctx.save();
    ctx.fillStyle = `rgba(200,0,0,${0.5+0.5*Math.sin(Date.now()/200)})`;
    ctx.font = "bold 2.5rem 'Creepster',cursive";
    ctx.textAlign = 'center';
    ctx.shadowBlur = 20; ctx.shadowColor = '#ff0000';
    ctx.fillText('GOLF ' + wave + ' KOMT ERAAN...', W/2, H/2);
    ctx.restore();
  }
}

// ---- DRAW PLAYER: Muslim character with abaya ----
function drawPlayer() {
  const p = player;
  const cx = p.x + p.w/2, cy = p.y + p.h/2;
  ctx.save();
  ctx.translate(cx, cy);

  if (p.invincible > 0 && Math.floor(p.invincible/5) % 2 === 0) ctx.globalAlpha = 0.3;

  // Subtle glow
  ctx.shadowBlur = 15; ctx.shadowColor = '#4caf50';

  // Abaya sway based on walking
  const sway = Math.sin(walkCycle) * 2;

  // ── Abaya (long flowing robe) ──
  // Main robe body - dark flowing garment
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.moveTo(-16, -18);   // left shoulder
  ctx.lineTo(-18 + sway, 28);    // left bottom (sway)
  ctx.quadraticCurveTo(-10, 32, 0, 30);  // bottom curve
  ctx.quadraticCurveTo(10, 32, 18 - sway, 28);  // right bottom
  ctx.lineTo(16, -18);    // right shoulder
  ctx.closePath();
  ctx.fill();

  // Abaya fold lines
  ctx.strokeStyle = '#0d0d18';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-6, -10); ctx.lineTo(-8 + sway*0.5, 26);
  ctx.moveTo(4, -10); ctx.lineTo(2 + sway*0.5, 26);
  ctx.moveTo(-12, -5); ctx.lineTo(-14 + sway*0.7, 25);
  ctx.stroke();

  // Green trim at bottom of abaya (Islamic touch)
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-18 + sway, 27);
  ctx.quadraticCurveTo(-10, 31, 0, 29);
  ctx.quadraticCurveTo(10, 31, 18 - sway, 27);
  ctx.stroke();

  // ── Sleeves ──
  // Left sleeve
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.moveTo(-16, -12);
  ctx.lineTo(-24, 2);
  ctx.lineTo(-20, 6);
  ctx.lineTo(-14, -4);
  ctx.closePath();
  ctx.fill();

  // Right sleeve
  ctx.beginPath();
  ctx.moveTo(16, -12);
  ctx.lineTo(24, 2);
  ctx.lineTo(20, 6);
  ctx.lineTo(14, -4);
  ctx.closePath();
  ctx.fill();

  // ── Hands (skin) ──
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.arc(-22, 5, 4, 0, Math.PI*2);
  ctx.arc(22, 5, 4, 0, Math.PI*2);
  ctx.fill();

  // ── Head with kufi/taqiyah ──
  // Head (skin)
  ctx.fillStyle = '#c8945a';
  ctx.beginPath();
  ctx.arc(0, -28, 14, 0, Math.PI*2);
  ctx.fill();

  // Kufi (prayer cap) - white with pattern
  ctx.fillStyle = '#f5f5f0';
  ctx.beginPath();
  ctx.ellipse(0, -34, 15, 8, 0, Math.PI, Math.PI*2);
  ctx.fill();

  // Kufi pattern lines
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 0.8;
  for (let i = -12; i <= 12; i += 4) {
    ctx.beginPath();
    const topY = -38 + Math.abs(i)*0.3;
    ctx.moveTo(i, -34);
    ctx.lineTo(i, topY);
    ctx.stroke();
  }

  // Kufi border
  ctx.strokeStyle = '#2e7d32';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(0, -34, 15, 8, 0, Math.PI+0.1, -0.1);
  ctx.stroke();

  // ── Beard (small neat beard) ──
  ctx.fillStyle = '#1a0f00';
  ctx.beginPath();
  ctx.moveTo(-7, -20);
  ctx.quadraticCurveTo(-8, -14, -5, -12);
  ctx.quadraticCurveTo(0, -10, 5, -12);
  ctx.quadraticCurveTo(8, -14, 7, -20);
  ctx.closePath();
  ctx.fill();

  // ── Eyes ──
  // Eye whites
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(-5, -30, 3.5, 3, 0, 0, Math.PI*2);
  ctx.ellipse(5, -30, 3.5, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // Pupils (looking in facing direction)
  ctx.fillStyle = '#1a0f00';
  ctx.beginPath();
  ctx.arc(-5 + p.facing*1.5, -30, 2, 0, Math.PI*2);
  ctx.arc(5 + p.facing*1.5, -30, 2, 0, Math.PI*2);
  ctx.fill();

  // ── Shoes (simple) ──
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath();
  ctx.ellipse(-8 + sway*0.3, 30, 6, 3, 0, 0, Math.PI*2);
  ctx.ellipse(8 - sway*0.3, 30, 6, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // ── Gun (held in right hand) ──
  ctx.fillStyle = '#333';
  ctx.fillRect(p.facing > 0 ? 22 : -38, 1, 16, 7);
  ctx.fillStyle = '#555';
  ctx.fillRect(p.facing > 0 ? 34 : -34, 2, 5, 5);

  // ── Small green glow around player (spiritual protection aura) ──
  ctx.globalAlpha = 0.08 + Math.sin(Date.now()/500)*0.04;
  ctx.strokeStyle = '#4caf50';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, 38, 0, Math.PI*2);
  ctx.stroke();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  const cx = e.x + e.w/2, cy = e.y + e.h/2;
  ctx.translate(cx, cy);

  if (e.dying) {
    ctx.globalAlpha = 1 - e.deathTimer/35;
    ctx.scale(1 + e.deathTimer/35 * 0.5, 1 + e.deathTimer/35 * 0.5);
  }

  const isBig = e.type === 'big';
  const r = e.w/2;

  // Body pulsing
  const pulse = 1 + Math.sin(e.angle * 3) * 0.05;
  ctx.scale(pulse, pulse);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(0, r * 0.9, r * 0.7, r * 0.2, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = isBig ? '#1a0500' : '#0a1800';
  ctx.shadowBlur = isBig ? 20 : 12;
  ctx.shadowColor = isBig ? '#ff4400' : '#44ff00';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Tentacles / spikes
  const spikeCount = isBig ? 8 : 6;
  ctx.strokeStyle = isBig ? '#3a0a00' : '#0a3a00';
  ctx.lineWidth = isBig ? 5 : 3;
  for (let i = 0; i < spikeCount; i++) {
    const ang = (i / spikeCount) * Math.PI * 2 + e.angle;
    const len = r * (0.5 + 0.5 * Math.sin(e.angle * 2 + i));
    ctx.beginPath();
    ctx.moveTo(Math.cos(ang) * r, Math.sin(ang) * r);
    ctx.lineTo(Math.cos(ang) * (r + len), Math.sin(ang) * (r + len));
    ctx.stroke();
  }

  // Inner face
  ctx.fillStyle = isBig ? '#300a00' : '#0a3000';
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.7, 0, Math.PI*2);
  ctx.fill();

  // Eyes (3 eyes for horror)
  const eyeColor = isBig ? '#ff6600' : '#00ff66';
  ctx.fillStyle = eyeColor;
  ctx.shadowBlur = 12; ctx.shadowColor = eyeColor;
  ctx.beginPath();
  ctx.arc(-r*0.3, -r*0.15, r*0.16, 0, Math.PI*2);
  ctx.arc(r*0.3, -r*0.15, r*0.16, 0, Math.PI*2);
  ctx.arc(0, r*0.2, r*0.13, 0, Math.PI*2); // third eye
  ctx.fill();
  ctx.shadowBlur = 0;

  // Pupils
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-r*0.3, -r*0.15, r*0.07, 0, Math.PI*2);
  ctx.arc(r*0.3, -r*0.15, r*0.07, 0, Math.PI*2);
  ctx.arc(0, r*0.2, r*0.06, 0, Math.PI*2);
  ctx.fill();

  // Mouth
  ctx.fillStyle = '#550000';
  ctx.beginPath();
  ctx.arc(0, r*0.35, r*0.3, 0.2, Math.PI-0.2);
  ctx.fill();
  // Teeth
  ctx.fillStyle = '#cccc88';
  for (let t = -2; t <= 2; t++) {
    ctx.beginPath();
    ctx.moveTo(t * r*0.13, r*0.35);
    ctx.lineTo(t * r*0.13 + r*0.04, r*0.55);
    ctx.lineTo(t * r*0.13 + r*0.09, r*0.35);
    ctx.fill();
  }

  // HP bar
  if (!e.dying) {
    const bw = e.w + 10;
    const pct = e.hp / e.maxHp;
    ctx.fillStyle = '#1a0000';
    ctx.fillRect(-bw/2, -r - 18, bw, 7);
    ctx.fillStyle = pct > 0.5 ? '#00cc00' : pct > 0.25 ? '#cccc00' : '#cc0000';
    ctx.fillRect(-bw/2, -r - 18, bw * pct, 7);
  }

  ctx.restore();
}

// ---- EFFECTS ----
function spawnParticles(x,y,color,count) {
  for(let i=0;i<count;i++) particles.push({x,y,vx:(Math.random()-0.5)*12,vy:(Math.random()-0.5)*12-2,life:15+Math.random()*20,color,size:2+Math.random()*5});
}

function addBloodSplat(x,y) {
  const el = document.createElement('div');
  el.className = 'bloodSplat';
  el.textContent = ['🩸','💀','☠️'][Math.floor(Math.random()*3)];
  el.style.left = x+'px'; el.style.top = y+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 600);
}

function showHitFlash() {
  const f = document.getElementById('hitFlash');
  f.style.opacity = '1';
  setTimeout(()=>f.style.opacity='0', 100);
}

function updateHUD() {
  document.getElementById('healthFill').style.width = Math.max(0,(player.hp/player.maxHp)*100)+'%';
  document.getElementById('scoreDisplay').textContent = 'SCORE: ' + score;
}

let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playShootSound() {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.frequency.setValueAtTime(300, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.08);
    g.gain.setValueAtTime(0.08, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
    osc.start(); osc.stop(ac.currentTime + 0.1);
  } catch(err) {}
}

function showJumpscare() {
  document.getElementById('jumpscare').classList.add('active');
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.setValueAtTime(60, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, ac.currentTime + 0.4);
    gain.gain.setValueAtTime(0.4, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.2);
    osc.start(); osc.stop(ac.currentTime + 1.2);
  } catch(e) {}
  setTimeout(() => { document.getElementById('restartBtn').style.display = 'block'; }, 2000);
}

function restartGame() {
  document.getElementById('jumpscare').classList.remove('active');
  document.getElementById('restartBtn').style.display = 'none';
  initGame();
}
