<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MijnCraft</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#000;overflow:hidden;font-family:'VT323','Courier New',monospace;user-select:none;touch-action:none;}
canvas{display:block;position:fixed;inset:0;}
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:20;width:24px;height:24px;}
#xhair::before,#xhair::after{content:'';position:absolute;background:#fff;opacity:.85;filter:drop-shadow(0 0 1px #000);}
#xhair::before{width:2px;height:100%;left:50%;transform:translateX(-50%);}
#xhair::after{height:2px;width:100%;top:50%;transform:translateY(-50%);}
#hud{position:fixed;top:10px;left:12px;color:#fff;font-size:18px;line-height:1.7;z-index:20;pointer-events:none;text-shadow:2px 2px 0 #000;background:rgba(0,0,0,.4);padding:6px 12px;border:1px solid rgba(255,255,255,.15);border-radius:4px;}
#hotbar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:30;background:rgba(0,0,0,.6);padding:5px;border:2px solid rgba(255,255,255,.25);border-radius:5px;}
.slot{width:52px;height:52px;border:2px solid #666;background:rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#fff;font-size:13px;cursor:pointer;border-radius:3px;transition:border-color .1s,background .1s;}
.slot.active{border-color:#fff;background:rgba(255,255,255,.22);}
.slot canvas{width:30px;height:30px;image-rendering:pixelated;}
#flash{position:fixed;top:38%;left:50%;transform:translateX(-50%);color:#FFE44A;font-size:22px;text-shadow:2px 2px 0 #000;opacity:0;transition:opacity .4s;pointer-events:none;z-index:20;}
#hint{position:fixed;top:10px;right:12px;background:rgba(0,0,0,.5);padding:7px 12px;color:#ddd;font-size:15px;line-height:1.8;border-radius:4px;text-align:right;z-index:20;pointer-events:none;border:1px solid rgba(255,255,255,.1);}
#joystick{position:fixed;left:20px;bottom:90px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2);z-index:40;touch-action:none;}
#jknob{position:absolute;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.5);border:2px solid rgba(255,255,255,.8);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
#lookpad{position:fixed;right:20px;bottom:90px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);z-index:40;touch-action:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:14px;}
#btn-jump{position:fixed;right:175px;bottom:105px;width:58px;height:58px;border-radius:50%;background:rgba(80,200,80,.75);border:2px solid #9f9;color:#fff;font-size:26px;z-index:40;touch-action:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#btn-brk{position:fixed;right:175px;bottom:22px;width:52px;height:52px;border-radius:8px;background:rgba(220,50,50,.75);border:2px solid #f88;color:#fff;font-size:12px;font-weight:bold;z-index:40;touch-action:none;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;line-height:1.2;}
#btn-plc{position:fixed;right:240px;bottom:22px;width:52px;height:52px;border-radius:8px;background:rgba(50,100,220,.75);border:2px solid #88f;color:#fff;font-size:12px;font-weight:bold;z-index:40;touch-action:none;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;line-height:1.2;}
#btn-cam{position:fixed;right:22px;bottom:240px;width:46px;height:46px;border-radius:8px;background:rgba(0,0,0,.55);border:2px solid rgba(255,255,255,.3);color:#fff;font-size:20px;z-index:40;touch-action:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#camtag{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#ddd;font-size:15px;padding:3px 14px;border-radius:20px;z-index:20;pointer-events:none;}
#startscreen{position:fixed;inset:0;z-index:100;background:linear-gradient(170deg,#071428 0%,#0a3808 55%,#051404 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#fff;}
#startscreen h1{font-size:clamp(44px,11vw,96px);letter-spacing:6px;color:#6FFFA0;text-shadow:4px 4px 0 #000,-3px -3px 0 #0a5a28,0 0 60px rgba(80,255,140,.2);}
#startscreen p{color:#8dcca0;font-size:18px;letter-spacing:2px;}
#startscreen small{color:#567a62;font-size:14px;}
#startbtn{margin-top:14px;padding:16px 60px;font-size:22px;font-family:inherit;font-weight:bold;letter-spacing:4px;color:#fff;background:linear-gradient(135deg,#1a6e30,#28aa50);border:3px solid #5ef888;cursor:pointer;border-radius:4px;text-shadow:1px 1px 0 #000;transition:.15s;}
#startbtn:hover,#startbtn:active{background:linear-gradient(135deg,#25903e,#33cc60);transform:scale(1.04);}
#health{position:fixed;bottom:75px;left:50%;transform:translateX(-50%);display:flex;gap:3px;z-index:20;pointer-events:none;}
.heart{font-size:18px;}
#quiz-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;}
#quiz-overlay.active{display:flex;}
#quiz-box{background:linear-gradient(160deg,#0a1a2e,#0d2a0d);border:2px solid #6FFFA0;border-radius:8px;padding:22px 26px;max-width:420px;width:92%;color:#fff;font-family:'VT323','Courier New',monospace;}
#quiz-box h2{font-size:22px;color:#6FFFA0;margin-bottom:4px;letter-spacing:2px;}
#quiz-ayah{font-size:13px;color:#8dcca0;margin-bottom:14px;line-height:1.5;}
#quiz-question{font-size:19px;margin-bottom:14px;line-height:1.4;}
.quiz-opt{display:block;width:100%;text-align:left;font-family:inherit;font-size:17px;padding:8px 12px;margin-bottom:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;border-radius:4px;transition:.15s;}
.quiz-opt:hover{background:rgba(111,255,160,.18);border-color:#6FFFA0;}
.quiz-opt.correct{background:rgba(0,200,80,.35);border-color:#0f0;}
.quiz-opt.wrong{background:rgba(200,40,40,.35);border-color:#f44;}
#quiz-feedback{font-size:16px;min-height:22px;margin-top:6px;color:#FFE44A;}
#quiz-reward{margin-top:12px;display:none;}
#quiz-reward p{font-size:16px;color:#adf;margin-bottom:8px;}
.reward-btn{font-family:inherit;font-size:16px;padding:7px 16px;margin-right:8px;background:rgba(60,120,60,.8);border:1px solid #6f6;color:#fff;cursor:pointer;border-radius:3px;}
#quiz-skip{margin-top:10px;font-family:inherit;font-size:14px;padding:5px 12px;background:transparent;border:1px solid #555;color:#888;cursor:pointer;border-radius:3px;}
#inv-panel{position:fixed;top:140px;right:12px;background:rgba(0,0,0,.65);padding:8px 12px;color:#fff;font-size:16px;line-height:1.9;border-radius:4px;z-index:20;border:1px solid rgba(255,255,255,.15);min-width:165px;}
#inv-panel h3{font-size:17px;color:#FFE44A;margin-bottom:4px;letter-spacing:1px;}
.inv-row{display:flex;justify-content:space-between;gap:12px;}
.inv-count{color:#adf;}
#craft-btns{margin-top:6px;display:flex;flex-direction:column;gap:4px;}
.craft-btn{font-family:inherit;font-size:14px;padding:4px 8px;background:rgba(60,120,60,.8);border:1px solid #6f6;color:#fff;cursor:pointer;border-radius:3px;}
.craft-btn:disabled{background:rgba(40,40,40,.6);border-color:#555;color:#888;cursor:default;}
#active-tool{color:#FFD700;font-size:15px;margin-top:4px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="xhair"></div>
<div id="hud">FPS: <span id="fps">-</span><br>XYZ: <span id="pos">-</span></div>
<div id="hotbar"></div>
<div id="flash"></div>
<div id="hint">WASD · Lopen<br>Spatie · Springen<br>Sleep muis · Kijken<br>Klik · Breken/Plaatsen<br>V · Camera<br>1-6 · Blok</div>
<div id="health"></div>
<div id="inv-panel">
  <h3>🎒 Inventory</h3>
  <div id="inv-rows"></div>
  <div id="active-tool"></div>
  <div id="craft-btns"></div>
</div>
<div id="camtag">📷 Derde persoon</div>
<div id="joystick"><div id="jknob"></div></div>
<div id="lookpad">👁 Sleep</div>
<div id="btn-jump">↑</div>
<div id="btn-brk">⛏<br>Brek</div>
<div id="btn-plc">🧱<br>Plaats</div>
<div id="btn-cam">📷</div>
<div id="quiz-overlay">
  <div id="quiz-box">
    <h2>📖 Islamitische Vraag</h2>
    <div id="quiz-ayah"></div>
    <div id="quiz-question"></div>
    <div id="quiz-options"></div>
    <div id="quiz-feedback"></div>
    <div id="quiz-reward">
      <p>🎉 Kies je beloning:</p>
      <button class="reward-btn" onclick="giveReward('wood')">🪵 +5 Hout</button>
      <button class="reward-btn" onclick="giveReward('stone')">🪨 +5 Steen</button>
      <button class="reward-btn" onclick="giveReward('iron_ore')">🟠 +3 IJzererts</button>
    </div>
    <button id="quiz-skip" onclick="closeQuiz()">Sla over</button>
  </div>
</div>
<div id="startscreen">
  <h1>⛏ MIJNCRAFT</h1>
  <p>Bouw · Graaf · Verken</p>
  <small>Chromebook editie</small>
  <button id="startbtn">▶ SPELEN</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

const INV_LABELS={wood:'🪵 Hout',dirt:'🟤 Aarde',stone:'🪨 Steen',sand:'🏖 Zand',coal:'⚫ Kool',iron_ore:'🟠 IJzererts',diamond:'💎 Diamant'};const TOOL_LABELS={wood_pickaxe:'🪓 Houten pickaxe',stone_pickaxe:'⛏ Stenen pickaxe'};const CRAFT_RECIPES=[{id:'wood_pickaxe',needs:{wood:3},label:'Houten pickaxe'},{id:'stone_pickaxe',needs:{wood:2,stone:3},label:'Stenen pickaxe'}];
function getItemLabel(key){return(INV_LABELS[key]||key);}
function updateInventoryUI(){const rows=document.getElementById('inv-rows');if(!rows)return;const items=Object.entries(INV_LABELS).filter(([k])=>(inventory[k]||0)>0);rows.innerHTML=items.length?items.map(([k,l])=>`<div class="inv-row"><span>${l}</span><span class="inv-count">${inventory[k]}</span></div>`).join(''):'<div style="color:#888;font-size:14px">Nog niets gevonden</div>';const toolEl=document.getElementById('active-tool');if(toolEl)toolEl.textContent=activeTool?(TOOL_LABELS[activeTool]||activeTool):'';const btns=document.getElementById('craft-btns');if(!btns)return;btns.innerHTML='';CRAFT_RECIPES.forEach(r=>{const can=Object.entries(r.needs).every(([k,v])=>(inventory[k]||0)>=v);const owned=activeTool===r.id;const btn=document.createElement('button');btn.className='craft-btn';btn.textContent=(owned?'✅ ':'🔨 ')+'Craft '+r.label;btn.disabled=!can||owned;btn.onclick=()=>doCraft(r);btns.appendChild(btn);});}
function doCraft(recipe){const can=Object.entries(recipe.needs).every(([k,v])=>(inventory[k]||0)>=v);if(!can)return;Object.entries(recipe.needs).forEach(([k,v])=>{inventory[k]-=v;});activeTool=recipe.id;showFlash('🔨 '+recipe.label+' gecraftd!');updateInventoryUI();}
const QUIZ_QUESTIONS=[{q:'Hoeveel pilaren heeft de Islam?',a:1,opts:['3','5','7','10'],ayah:'De Profeet ﷺ zei: "De Islam is gebouwd op vijf pilaren."'},{q:'Wat is de eerste pilaar van de Islam?',a:0,opts:['De Shahada','Het Gebed','De Zakat','De Hajj'],ayah:'De Shahada is: "Ik getuig dat er geen god is dan Allah..."'},{q:'Hoeveel keer per dag bidden Moslims?',a:2,opts:['3','4','5','6'],ayah:'Allah zegt: "Waarlijk, het gebed is voor de gelovigen op vaste tijden verplicht." (4:103)'},{q:'Welke maand is de vastenmaand?',a:1,opts:['Shawwal','Ramadan','Rajab','Muharram'],ayah:'"O jullie die geloven! Het vasten is jullie voorgeschreven..." (2:183)'},{q:'In welke stad werd de Profeet Muhammad ﷺ geboren?',a:0,opts:['Mekka','Medina','Jeruzalem','Taif'],ayah:'De Profeet ﷺ werd geboren in Mekka, de Gezegende Stad.'},{q:'Wat is de heilige boek van de Islam?',a:2,opts:['Bijbel','Torah','Koran','Zabur'],ayah:'"Waarlijk, Wij hebben de Koran neergezonden en Wij zullen het bewaken." (15:9)'},{q:'Hoeveel engelen worden er bij naam in de Koran genoemd?',a:1,opts:['1','3','5','12'],ayah:'Jibril, Mika\u02bcil en Israfil worden in de islamitische teksten genoemd.'},{q:'Welke profeet bouwde de Kaba?',a:3,opts:['Musa','Isa','Muhammad','Ibrahim'],ayah:'"En toen Ibrahim en Ismail de fundamenten van het Huis verhieven..." (2:127)'},{q:'Hoeveel soeras heeft de Koran?',a:2,opts:['99','100','114','120'],ayah:'De Koran bestaat uit 114 soeras, van Al-Fatiha tot An-Nas.'},{q:'Wat betekent "Islam"?',a:1,opts:['Vrede','Overgave (aan Allah)','Geloof','Gebed'],ayah:'Islam betekent overgave en onderwerping aan de wil van Allah.'},{q:'Hoeveel jaar was de Profeet ﷺ toen hij stierf?',a:2,opts:['55','60','63','70'],ayah:'De Profeet Muhammad ﷺ overleed op 63-jarige leeftijd.'},{q:'Welke soera wordt "het hart van de Koran" genoemd?',a:0,opts:['Ya-Sin','Al-Baqarah','Al-Ikhlas','Al-Kahf'],ayah:'De Profeet ﷺ zei: "Ya-Sin is het hart van de Koran."'},{q:'Wat is Zakat?',a:1,opts:['Vrijwillige gift','Verplichte armenbelasting','Extra gebed','Vasten buiten Ramadan'],ayah:'"En verricht het gebed en geef de Zakat..." (2:43)'},{q:'Naar welke stad migreerde de Profeet ﷺ (Hijra)?',a:2,opts:['Taif','Jeruzalem','Medina','Damascus'],ayah:'De Hijra naar Medina in 622 na Chr. markeert het begin van de islamitische kalender.'},{q:'Wat is de kortste soera van de Koran?',a:3,opts:['Al-Fatiha','Al-Ikhlas','Al-Falaq','Al-Kawthar'],ayah:'Al-Kawthar bestaat uit slechts 3 verzen en is de kortste soera.'}];
let quizInterval=null;let quizAnswered=false;let currentQuiz=null;
function startQuizTimer(){quizInterval=setInterval(()=>openQuiz(),3*60*1000);}
function openQuiz(){const q=QUIZ_QUESTIONS[Math.floor(Math.random()*QUIZ_QUESTIONS.length)];currentQuiz=q;quizAnswered=false;document.getElementById('quiz-question').textContent=q.q;document.getElementById('quiz-ayah').textContent=q.ayah;document.getElementById('quiz-feedback').textContent='';document.getElementById('quiz-reward').style.display='none';document.getElementById('quiz-skip').style.display='';const opts=document.getElementById('quiz-options');opts.innerHTML='';q.opts.forEach((o,i)=>{const btn=document.createElement('button');btn.className='quiz-opt';btn.textContent=o;btn.onclick=()=>answerQuiz(i,btn);opts.appendChild(btn);});document.getElementById('quiz-overlay').classList.add('active');}
function answerQuiz(idx,btn){if(quizAnswered)return;quizAnswered=true;const q=currentQuiz;const opts=document.querySelectorAll('.quiz-opt');opts.forEach(b=>b.disabled=true);if(idx===q.a){btn.classList.add('correct');document.getElementById('quiz-feedback').textContent='✅ Correct! MashaAllah! Kies je beloning:';document.getElementById('quiz-reward').style.display='block';document.getElementById('quiz-skip').style.display='none';}else{btn.classList.add('wrong');opts[q.a].classList.add('correct');document.getElementById('quiz-feedback').textContent='❌ Fout. Het goede antwoord was: '+q.opts[q.a];setTimeout(()=>closeQuiz(),2800);}}
function giveReward(type){const amounts={wood:5,stone:5,iron_ore:3};const n=amounts[type]||2;inventory[type]=(inventory[type]||0)+n;updateInventoryUI();showFlash('🎁 +'+n+' '+getItemLabel(type)+' ontvangen!');closeQuiz();}
function closeQuiz(){document.getElementById('quiz-overlay').classList.remove('active');}
function setupInput(){const cv=ren.domElement;window.addEventListener('keydown',e=>{K[e.code]=true;const n=parseInt(e.key);if(n>=1&&n<=6){setSlot(n-1);}if(e.code==='KeyV')toggleCam();if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyA','KeyS','KeyD'].includes(e.code))e.preventDefault();});window.addEventListener('keyup',e=>{K[e.code]=false;});let mdown=false,mBtn=0,mMoved=false,mLX=0,mLY=0;cv.addEventListener('mousedown',e=>{mdown=true;mBtn=e.button;mMoved=false;mLX=e.clientX;mLY=e.clientY;try{cv.requestPointerLock();}catch(_){}});window.addEventListener('mouseup',e=>{if(!mMoved){if(mBtn===0)doBreak();if(mBtn===2)doPlace();}mdown=false;});window.addEventListener('mousemove',e=>{if(document.pointerLockElement===cv){mdx+=e.movementX;mdy+=e.movementY;mMoved=true;}else if(mdown){const dx=e.clientX-mLX,dy=e.clientY-mLY;if(Math.abs(dx)+Math.abs(dy)>3)mMoved=true;mdx+=dx;mdy+=dy;mLX=e.clientX;mLY=e.clientY;}});cv.addEventListener('contextmenu',e=>e.preventDefault());cv.addEventListener('wheel',e=>{setSlot((selSlot+(e.deltaY>0?1:-1)+6)%6);});const jw=document.getElementById('joystick');const jk=document.getElementById('jknob');const JR=46;function joyMove(tx,ty){const r=jw.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;const dx=tx-cx,dy=ty-cy;const dist=Math.min(Math.hypot(dx,dy),JR);const ang=Math.atan2(dy,dx);joyX=Math.cos(ang)*dist/JR;joyY=Math.sin(ang)*dist/JR;jk.style.left=(50+joyX*JR/r.width*100)+'%';jk.style.top=(50+joyY*JR/r.height*100)+'%';}function joyEnd(){joyOn=false;joyX=0;joyY=0;jk.style.left='50%';jk.style.top='50%';}jw.addEventListener('touchstart',e=>{e.preventDefault();joyOn=true;joyMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});jw.addEventListener('touchmove',e=>{e.preventDefault();joyMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});jw.addEventListener('touchend',e=>{e.preventDefault();joyEnd();},{passive:false});const lp=document.getElementById('lookpad');lp.addEventListener('touchstart',e=>{e.preventDefault();lookOn=true;lookX=e.touches[0].clientX;lookY=e.touches[0].clientY;},{passive:false});lp.addEventListener('touchmove',e=>{e.preventDefault();if(lookOn){mdx+=e.touches[0].clientX-lookX;mdy+=e.touches[0].clientY-lookY;lookX=e.touches[0].clientX;lookY=e.touches[0].clientY;}},{passive:false});lp.addEventListener('touchend',e=>{e.preventDefault();lookOn=false;},{passive:false});function tapBtn(el,downFn,upFn){el.addEventListener('touchstart',e=>{e.preventDefault();downFn&&downFn();},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();upFn&&upFn();},{passive:false});el.addEventListener('mousedown',downFn||null);el.addEventListener('mouseup',upFn||null);}tapBtn(document.getElementById('btn-jump'),()=>K.Space=true,()=>K.Space=false);document.getElementById('btn-brk').addEventListener('click',doBreak);document.getElementById('btn-brk').addEventListener('touchstart',e=>{e.preventDefault();doBreak();},{passive:false});document.getElementById('btn-plc').addEventListener('click',doPlace);document.getElementById('btn-plc').addEventListener('touchstart',e=>{e.preventDefault();doPlace();},{passive:false});document.getElementById('btn-cam').addEventListener('click',toggleCam);document.getElementById('btn-cam').addEventListener('touchstart',e=>{e.preventDefault();toggleCam();},{passive:false});document.getElementById('hotbar').addEventListener('click',e=>{const s=e.target.closest('.slot');if(s)setSlot(+s.dataset.i);});window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});}
function loop(){requestAnimationFrame(loop);const dt=Math.min(clock.getDelta(),.05);physicsStep(dt);animatePlayer();updateCamera();updateHighlight();fpsc++;const now=performance.now();if(now-fpst>800){document.getElementById('fps').textContent=Math.round(fpsc/((now-fpst)/1e3));fpsc=0;fpst=now;const p=P.pos;document.getElementById('pos').textContent=`${p.x.toFixed(1)} ${p.y.toFixed(1)} ${p.z.toFixed(1)}`;}ren.render(scene,cam);}
</script>
